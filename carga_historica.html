<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carga Histórica Índices</title>
<style>
body{font-family:system-ui;padding:40px;max-width:900px;margin:0 auto;background:#f5f5f5}
.card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}
h1{margin:0 0 8px;font-size:24px}
.sub{color:#666;font-size:14px;margin-bottom:20px}
button{background:#0066cc;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#0052a3}
button:disabled{opacity:.5;cursor:not-allowed}
.log{background:#f8f9fa;border:1px solid #dee2e6;border-radius:6px;padding:16px;font-family:monospace;font-size:12px;max-height:400px;overflow-y:auto;white-space:pre-wrap}
.progress{background:#e9ecef;height:8px;border-radius:4px;overflow:hidden;margin:16px 0}
.progress-bar{background:#0066cc;height:100%;transition:width .3s}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
.stat{text-align:center;padding:12px;background:#f8f9fa;border-radius:6px}
.stat-num{font-size:24px;font-weight:700;color:#0066cc}
.stat-lbl{font-size:11px;color:#666;text-transform:uppercase;margin-top:4px}
</style>
</head>
<body>

<div class="card">
  <h1>🔄 Carga Histórica de Índices</h1>
  <div class="sub">Diciembre 2023 → Actualidad | Todos los índices económicos</div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-lbl">Total períodos</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statOk">0</div>
      <div class="stat-lbl">Exitosos</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statErr">0</div>
      <div class="stat-lbl">Errores</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statPct">0%</div>
      <div class="stat-lbl">Progreso</div>
    </div>
  </div>
  
  <div class="progress">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  
  <button onclick="iniciarCarga()" id="btnStart">▶️ Iniciar Carga Histórica</button>
  <button onclick="guardarBD()" id="btnSave" disabled style="margin-left:8px">💾 Guardar en Supabase</button>
</div>

<div class="card">
  <h2 style="margin:0 0 12px;font-size:16px">📋 Log de Ejecución</h2>
  <div class="log" id="log">Esperando inicio...</div>
</div>

<script>
const CONFIG = {
  SB_URL: 'https://upxsqroxbvzwudcaklvn.supabase.co',
  SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweHNxcm94YnZ6d3VkY2FrbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg4NjYsImV4cCI6MjA5MTIzNDg2Nn0.EgXWuLg3ip66PnuCvK01XFj3QDMZDu7PDG21BwkzkNo',
  
  INDICES: [
    {id: 'ipc_nac', name: 'IPC Nacional', seriesId: '148.3_INIVELNAL_DICI_M_26'},
    {id: 'ipc_gba', name: 'IPC GBA', seriesId: '148.3_INIVELGBA_DICI_M_21'},
    {id: 'ipc_pat', name: 'IPC Patagonia', seriesId: '148.3_INIVELNIA_DICI_M_27'},
    {id: 'ipim_gral', name: 'IPIM General', seriesId: '448.1_NIVEL_GENERAL_0_0_13_46'},
    {id: 'ipim_r29', name: 'IPIM R29', seriesId: '448.1_REFINADOS_PETROLEO_0_0_13_46'},
    {id: 'usd_div', name: 'USD DIVISA', seriesId: '168.1_T_CAMBIOR_D_0_0_26'}
  ],
  
  START_DATE: '2023-12'
};

let STORE = {};
let STATS = {total: 0, ok: 0, err: 0};

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  const icon = type === 'ok' ? '✅' : type === 'err' ? '❌' : 'ℹ️';
  el.textContent += `[${time}] ${icon} ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('statTotal').textContent = STATS.total;
  document.getElementById('statOk').textContent = STATS.ok;
  document.getElementById('statErr').textContent = STATS.err;
  document.getElementById('statPct').textContent = Math.round((STATS.ok + STATS.err) / STATS.total * 100) + '%';
  document.getElementById('progressBar').style.width = Math.round((STATS.ok + STATS.err) / STATS.total * 100) + '%';
}

async function fetchSerie(seriesId, startDate) {
  const url = `https://apis.datos.gob.ar/series/api/series?ids=${seriesId}&format=json&start_date=${startDate}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('API error ' + r.status);
  const d = await r.json();
  return d.data || [];
}

function calcPct(current, prev) {
  if (!prev || prev === 0) return null;
  return Number((((current / prev) - 1) * 100).toFixed(2));
}

async function procesarIndice(idx) {
  log(`Procesando ${idx.name}...`);
  
  try {
    const data = await fetchSerie(idx.seriesId, CONFIG.START_DATE);
    log(`  → ${data.length} períodos obtenidos`);
    
    if (!STORE[idx.id]) STORE[idx.id] = {rows: []};
    
    for (let i = 0; i < data.length; i++) {
      const [fecha, valor] = data[i];
      const ym = fecha.slice(0, 7);
      
      let pct = null;
      if (i > 0 && valor > 20) {
        // Es serie (IPC/IPIM)
        const prevValor = data[i - 1][1];
        pct = calcPct(valor, prevValor);
      }
      
      STORE[idx.id].rows.push({
        ym,
        pct,
        value: Number(valor.toFixed(4)),
        seriesValue: valor > 20 ? Number(valor.toFixed(4)) : null,
        publishedAt: fecha.slice(0, 10),
        source: 'INDEC',
        confirmed: false
      });
      
      STATS.ok++;
      updateStats();
    }
    
    log(`✅ ${idx.name} completado (${data.length} períodos)`, 'ok');
    
  } catch (err) {
    log(`❌ Error en ${idx.name}: ${err.message}`, 'err');
    STATS.err++;
    updateStats();
  }
}

async function iniciarCarga() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('log').textContent = '';
  
  log('🚀 Iniciando carga histórica...');
  log(`📅 Desde: ${CONFIG.START_DATE}`);
  log(`📊 Índices: ${CONFIG.INDICES.length}`);
  
  // Calcular total
  const hoy = new Date();
  const inicio = new Date(CONFIG.START_DATE + '-01');
  const meses = Math.ceil((hoy - inicio) / (1000 * 60 * 60 * 24 * 30));
  STATS.total = CONFIG.INDICES.length * meses;
  updateStats();
  
  log(`\n⏱️  Períodos estimados: ${STATS.total}\n`);
  
  for (const idx of CONFIG.INDICES) {
    await procesarIndice(idx);
    await new Promise(r => setTimeout(r, 500)); // Rate limit
  }
  
  log(`\n🎉 CARGA COMPLETA`);
  log(`   Total: ${STATS.ok} exitosos, ${STATS.err} errores`);
  
  document.getElementById('btnSave').disabled = false;
}

async function guardarBD() {
  document.getElementById('btnSave').disabled = true;
  log('\n💾 Guardando en Supabase...');
  
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    
    // Verificar si existe registro
    const check = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id&limit=1`, {headers});
    const existing = await check.json();
    
    const payload = {datos: JSON.stringify(STORE)};
    
    let r;
    if (existing.length > 0) {
      // UPDATE
      log(`  → Actualizando registro existente (ID: ${existing[0].id})`);
      r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?id=eq.${existing[0].id}`, {
        method: 'PATCH',
        headers,
        body: JSON.stringify(payload)
      });
    } else {
      // INSERT
      log('  → Creando nuevo registro');
      r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices`, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload)
      });
    }
    
    if (!r.ok) throw new Error('Supabase error ' + r.status);
    
    log('✅ Guardado exitoso en Supabase', 'ok');
    log('\n🎊 PROCESO COMPLETO - Podés cerrar esta ventana');
    
  } catch (err) {
    log(`❌ Error al guardar: ${err.message}`, 'err');
    document.getElementById('btnSave').disabled = false;
  }
}
</script>

</body>
</html>
