<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Completar USD - ArgentinaDatos API</title>
<style>
body{font-family:system-ui;padding:40px;max-width:800px;margin:0 auto;background:#f5f5f5}
.card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}
h1{margin:0 0 8px;font-size:22px}
button{background:#0066cc;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px}
button:hover{background:#0052a3}
button:disabled{opacity:.5;cursor:not-allowed}
.log{background:#f8f9fa;border:1px solid #dee2e6;border-radius:6px;padding:16px;font-family:monospace;font-size:12px;max-height:500px;overflow-y:auto;white-space:pre-wrap}
.info{background:#d1ecf1;border-left:4px solid #0c5460;padding:12px;margin:12px 0;border-radius:4px;font-size:13px;color:#0c5460}
.stat{display:inline-block;padding:8px 16px;background:#f8f9fa;border-radius:6px;margin-right:8px;font-size:13px}
.stat strong{color:#0066cc;font-size:18px}
</style>
</head>
<body>

<div class="card">
  <h1>🔄 Completar USD - API ArgentinaDatos</h1>
  
  <div class="info">
    <strong>Fuente:</strong> api.argentinadatos.com (datos oficiales BNA/BCRA)<br>
    <strong>Histórico:</strong> Completo desde 2011 hasta hoy<br>
    <strong>Cobertura:</strong> USD Oficial (compra/venta) - sin necesidad de IA
  </div>
  
  <div style="margin:16px 0">
    <span class="stat">Encontrados: <strong id="statFound">0</strong></span>
    <span class="stat">Procesados: <strong id="statProc">0</strong></span>
    <span class="stat">Total mes: <strong id="statMonth">0</strong></span>
  </div>
  
  <button onclick="cargarUSD()" id="btnStart">▶️ Cargar USD desde ArgentinaDatos</button>
  <button onclick="guardarBD()" id="btnSave" disabled>💾 Guardar en Supabase</button>
</div>

<div class="card">
  <h2 style="margin:0 0 12px;font-size:16px">📋 Log</h2>
  <div class="log" id="log">Esperando inicio...</div>
</div>

<script>
const CONFIG = {
  SB_URL: 'https://upxsqroxbvzwudcaklvn.supabase.co',
  SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweHNxcm94YnZ6d3VkY2FrbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg4NjYsImV4cCI6MjA5MTIzNDg2Nn0.EgXWuLg3ip66PnuCvK01XFj3QDMZDu7PDG21BwkzkNo',
  
  // API ArgentinaDatos - Histórico oficial
  API_USD_OFICIAL: 'https://api.argentinadatos.com/v1/cotizaciones/dolares/oficial'
};

let STORE = {};

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  const icon = type === 'ok' ? '✅' : type === 'err' ? '❌' : type === 'warn' ? '⚠️' : 'ℹ️';
  el.textContent += `[${time}] ${icon} ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function updateStat(id, val) {
  document.getElementById(id).textContent = val;
}

async function cargarUSD() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('log').textContent = '';
  
  log('🚀 Iniciando carga USD desde ArgentinaDatos...');
  
  // 1. Cargar datos actuales de Supabase
  log('\n📥 Paso 1: Cargando estado actual...');
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY
    };
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id,datos&limit=1`, {headers});
    const rows = await r.json();
    
    if (!rows.length) {
      log('❌ No se encontró registro en Supabase', 'err');
      return;
    }
    
    STORE = JSON.parse(rows[0].datos);
    log(`✅ Cargado registro ID: ${rows[0].id}`);
    log(`   USD actual: ${STORE.usd_div?.rows?.length || 0} períodos`);
    
  } catch (err) {
    log(`❌ Error: ${err.message}`, 'err');
    return;
  }
  
  // 2. Llamar API ArgentinaDatos
  log('\n📡 Paso 2: Consultando API ArgentinaDatos...');
  log(`   URL: ${CONFIG.API_USD_OFICIAL}`);
  
  let datos;
  try {
    const r = await fetch(CONFIG.API_USD_OFICIAL);
    if (!r.ok) throw new Error('API status ' + r.status);
    datos = await r.json();
    
    log(`✅ Recibidos ${datos.length} registros`);
    
    // Mostrar muestra
    if (datos.length > 0) {
      const ultimo = datos[datos.length - 1];
      log(`   Último: ${ultimo.fecha} → Compra ${ultimo.compra} / Venta ${ultimo.venta}`);
      
      const primero = datos[0];
      log(`   Primero: ${primero.fecha} → Compra ${primero.compra} / Venta ${primero.venta}`);
    }
    
  } catch (err) {
    log(`❌ Error API: ${err.message}`, 'err');
    log('   Probando con timestamp para evitar caché...');
    
    try {
      const r = await fetch(CONFIG.API_USD_OFICIAL + '?t=' + Date.now());
      if (!r.ok) throw new Error('API status ' + r.status);
      datos = await r.json();
      log(`✅ Recibidos ${datos.length} registros`);
    } catch (err2) {
      log(`❌ Error definitivo: ${err2.message}`, 'err');
      return;
    }
  }
  
  // 3. Procesar - agrupar por mes (último día del mes)
  log('\n🔄 Paso 3: Procesando datos...');
  
  // Filtrar desde Dic 2023
  const desde = '2023-12';
  const filtrados = datos.filter(d => d.fecha && d.fecha >= desde + '-01');
  log(`   Filtrados desde ${desde}: ${filtrados.length} registros diarios`);
  
  // Agrupar por mes y tomar último valor de cada mes
  const porMes = {};
  filtrados.forEach(d => {
    const ym = d.fecha.slice(0, 7);
    if (!porMes[ym] || d.fecha > porMes[ym].fecha) {
      porMes[ym] = d;
    }
  });
  
  const meses = Object.keys(porMes).sort();
  log(`   Meses únicos: ${meses.length}`);
  updateStat('statMonth', meses.length);
  
  // 4. Construir nueva estructura USD
  log('\n📊 Paso 4: Construyendo IDX_STORE.usd_div...');
  
  const nuevosRows = [];
  meses.forEach((ym, i) => {
    const d = porMes[ym];
    const venta = Number(d.venta);
    
    if (!Number.isFinite(venta)) {
      log(`   ⚠️ Saltando ${ym} - venta inválida`, 'warn');
      return;
    }
    
    nuevosRows.push({
      ym,
      pct: null,
      value: Number(venta.toFixed(2)),
      seriesValue: Number(venta.toFixed(2)),
      publishedAt: d.fecha,
      source: 'BNA',
      note: `BNA/BCRA - ${d.fecha} (compra ${d.compra} / venta ${venta})`,
      confirmed: false
    });
    
    updateStat('statProc', i + 1);
  });
  
  log(`✅ Construidos ${nuevosRows.length} períodos USD`);
  
  // Mostrar muestra
  if (nuevosRows.length > 0) {
    log(`\n📋 Muestra de datos:`);
    log(`   Primero: ${nuevosRows[0].ym} → $${nuevosRows[0].value}`);
    log(`   Mitad:   ${nuevosRows[Math.floor(nuevosRows.length/2)].ym} → $${nuevosRows[Math.floor(nuevosRows.length/2)].value}`);
    log(`   Último:  ${nuevosRows[nuevosRows.length-1].ym} → $${nuevosRows[nuevosRows.length-1].value}`);
  }
  
  // 5. Reemplazar usd_div completo
  STORE.usd_div = {rows: nuevosRows};
  STORE.usd_bill = {rows: nuevosRows.map(r => ({...r}))}; // Copia para usd_bill
  
  updateStat('statFound', nuevosRows.length);
  
  log(`\n🎉 LISTO PARA GUARDAR`);
  log(`   USD DIVISA: ${nuevosRows.length} períodos (${nuevosRows[0]?.ym} → ${nuevosRows[nuevosRows.length-1]?.ym})`);
  log(`   USD BILLETE: ${nuevosRows.length} períodos (mismo dato)`);
  
  document.getElementById('btnSave').disabled = false;
}

async function guardarBD() {
  document.getElementById('btnSave').disabled = true;
  log('\n💾 Guardando en Supabase...');
  
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    
    const check = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id&limit=1`, {headers});
    const existing = await check.json();
    
    const payload = {datos: JSON.stringify(STORE)};
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?id=eq.${existing[0].id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify(payload)
    });
    
    if (!r.ok) throw new Error('Supabase ' + r.status);
    
    log('✅ Guardado exitoso', 'ok');
    log('\n🎊 PROCESO COMPLETO');
    log('   → Recargá index.html para ver los cambios');
    log('   → USD debe mostrar hasta el mes actual');
    
  } catch (err) {
    log(`❌ Error: ${err.message}`, 'err');
    document.getElementById('btnSave').disabled = false;
  }
}
</script>

</body>
</html>
