<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Completar USD Faltante</title>
<style>
body{font-family:system-ui;padding:40px;max-width:800px;margin:0 auto;background:#f5f5f5}
.card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}
h1{margin:0 0 8px;font-size:22px}
button{background:#0066cc;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px}
button:hover{background:#0052a3}
button:disabled{opacity:.5;cursor:not-allowed}
.log{background:#f8f9fa;border:1px solid #dee2e6;border-radius:6px;padding:16px;font-family:monospace;font-size:12px;max-height:400px;overflow-y:auto;white-space:pre-wrap}
.info{background:#d1ecf1;border-left:4px solid:#0c5460;padding:12px;margin:12px 0;border-radius:4px;font-size:13px;color:#0c5460}
.warn{background:#fff3cd;border-left:4px solid:#856404;padding:12px;margin:12px 0;border-radius:4px;font-size:13px;color:#856404}
</style>
</head>
<body>

<div class="card">
  <h1>🔄 Completar USD Faltante (Abr 2024 → Hoy)</h1>
  
  <div class="info">
    <strong>Problema detectado:</strong> USD DIVISA solo tiene datos hasta Mar 2024.<br>
    <strong>Solución:</strong> Gemini AI buscará los valores faltantes mes a mes.
  </div>
  
  <button onclick="completarUSD()" id="btnStart">▶️ Completar USD con IA</button>
  <button onclick="guardarBD()" id="btnSave" disabled>💾 Guardar en Supabase</button>
</div>

<div class="card">
  <h2 style="margin:0 0 12px;font-size:16px">📋 Log</h2>
  <div class="log" id="log">Esperando...</div>
</div>

<script>
const CONFIG = {
  SB_URL: 'https://upxsqroxbvzwudcaklvn.supabase.co',
  SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweHNxcm94YnZ6d3VkY2FrbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg4NjYsImV4cCI6MjA5MTIzNDg2Nn0.EgXWuLg3ip66PnuCvK01XFj3QDMZDu7PDG21BwkzkNo',
  GEMINI_PROXY: 'https://upxsqroxbvzwudcaklvn.supabase.co/functions/v1/gemini-proxy'
};

let STORE = {};
let nuevosRows = 0;

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  const icon = type === 'ok' ? '✅' : type === 'err' ? '❌' : 'ℹ️';
  el.textContent += `[${time}] ${icon} ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

async function callGemini(prompt) {
  for (let retry = 0; retry < 3; retry++) {
    try {
      const r = await fetch(CONFIG.GEMINI_PROXY, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + CONFIG.SB_KEY
        },
        body: JSON.stringify({parts: [{text: prompt}]})
      });
      
      if (r.status === 502 || r.status === 503) {
        await new Promise(res => setTimeout(res, 2000));
        continue;
      }
      
      if (!r.ok) throw new Error('Gemini ' + r.status);
      
      const data = await r.json();
      return (data?.candidates?.[0]?.content?.parts || [])
        .map(p => p.text || '')
        .join('\n')
        .trim();
    } catch (err) {
      if (retry === 2) throw err;
      await new Promise(res => setTimeout(res, 1200));
    }
  }
}

function parseJSON(txt) {
  if (!txt) return null;
  let raw = txt.replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
  const m = raw.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try {
    return JSON.parse(m[0].replace(/,\s*}/g, '}').replace(/,\s*]/g, ']'));
  } catch {
    return null;
  }
}

async function fetchUSDforMonth(ym) {
  const [year, month] = ym.split('-');
  const monthName = new Date(+year, +month - 1, 1).toLocaleDateString('es-AR', {month: 'long'});
  
  const prompt = `Necesito el tipo de cambio USD DIVISA (vendedor) oficial del BCRA para ${monthName} ${year} (${ym}).

Busca el valor OFICIAL publicado por el Banco Central de la República Argentina (BCRA) para el último día hábil del mes.

Responde ÚNICAMENTE con JSON:
{
  "ym": "${ym}",
  "value": <número con 2 decimales>,
  "note": "BCRA - última cotización del mes"
}

Si no encuentras el dato exacto, responde: {"ym":"${ym}","value":null,"note":"No disponible"}`;

  log(`  Buscando USD ${ym} vía IA...`);
  
  try {
    const response = await callGemini(prompt);
    const data = parseJSON(response);
    
    if (!data || data.value === null) {
      log(`  ❌ No encontrado para ${ym}`, 'err');
      return null;
    }
    
    log(`  ✅ ${ym}: $${data.value}`);
    
    return {
      ym,
      pct: null,
      value: Number(data.value),
      seriesValue: Number(data.value),
      publishedAt: null,
      source: 'AI',
      note: data.note || 'Gemini AI',
      confirmed: false
    };
    
  } catch (err) {
    log(`  ❌ Error ${ym}: ${err.message}`, 'err');
    return null;
  }
}

async function completarUSD() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('log').textContent = '';
  
  log('🚀 Iniciando completado USD...');
  
  // 1. Cargar datos actuales
  log('📥 Cargando datos actuales...');
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY
    };
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id,datos&limit=1`, {headers});
    const rows = await r.json();
    
    if (!rows.length) {
      log('❌ No se encontró registro en Supabase', 'err');
      return;
    }
    
    STORE = JSON.parse(rows[0].datos);
    log(`✅ Cargado ID: ${rows[0].id}`);
    
    const usdRows = STORE.usd_div?.rows || [];
    log(`📊 USD actual: ${usdRows.length} períodos`);
    
    if (usdRows.length > 0) {
      const ultimo = usdRows[usdRows.length - 1];
      log(`   Último: ${ultimo.ym} = $${ultimo.value}`);
    }
    
  } catch (err) {
    log(`❌ Error cargando: ${err.message}`, 'err');
    return;
  }
  
  // 2. Generar meses faltantes
  const inicio = new Date('2024-04-01');
  const hoy = new Date();
  const mesesFaltantes = [];
  
  let current = new Date(inicio);
  while (current <= hoy) {
    const ym = current.getFullYear() + '-' + String(current.getMonth() + 1).padStart(2, '0');
    mesesFaltantes.push(ym);
    current.setMonth(current.getMonth() + 1);
  }
  
  log(`\n🔍 Buscando ${mesesFaltantes.length} meses faltantes...`);
  
  // 3. Buscar con IA
  for (const ym of mesesFaltantes) {
    const row = await fetchUSDforMonth(ym);
    
    if (row) {
      if (!STORE.usd_div) STORE.usd_div = {rows: []};
      STORE.usd_div.rows.push(row);
      nuevosRows++;
    }
    
    await new Promise(r => setTimeout(r, 1000)); // Rate limit
  }
  
  log(`\n🎉 COMPLETADO`);
  log(`   Nuevos períodos: ${nuevosRows}`);
  log(`   Total USD ahora: ${STORE.usd_div.rows.length}`);
  
  if (nuevosRows > 0) {
    document.getElementById('btnSave').disabled = false;
  }
}

async function guardarBD() {
  document.getElementById('btnSave').disabled = true;
  log('\n💾 Guardando en Supabase...');
  
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    
    const check = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id&limit=1`, {headers});
    const existing = await check.json();
    
    const payload = {datos: JSON.stringify(STORE)};
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?id=eq.${existing[0].id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify(payload)
    });
    
    if (!r.ok) throw new Error('Supabase ' + r.status);
    
    log('✅ Guardado exitoso', 'ok');
    log('\n🎊 PROCESO COMPLETO');
    log('   → Recargá index.html para ver los cambios');
    
  } catch (err) {
    log(`❌ Error: ${err.message}`, 'err');
    document.getElementById('btnSave').disabled = false;
  }
}
</script>

</body>
</html>
