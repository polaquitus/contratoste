<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cargar Gas Oil - YPF Neuquén</title>
<style>
body{font-family:system-ui;padding:40px;max-width:900px;margin:0 auto;background:#f5f5f5}
.card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}
h1{margin:0 0 8px;font-size:22px}
button{background:#0066cc;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px}
button:hover{background:#0052a3}
button:disabled{opacity:.5;cursor:not-allowed}
.log{background:#f8f9fa;border:1px solid #dee2e6;border-radius:6px;padding:16px;font-family:monospace;font-size:12px;max-height:500px;overflow-y:auto;white-space:pre-wrap}
.info{background:#d1ecf1;border-left:4px solid #0c5460;padding:12px;margin:12px 0;border-radius:4px;font-size:13px;color:#0c5460}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.stat{text-align:center;padding:12px;background:#f8f9fa;border-radius:6px}
.stat-num{font-size:24px;font-weight:700;color:#0066cc}
.stat-lbl{font-size:11px;color:#666;text-transform:uppercase;margin-top:4px}
</style>
</head>
<body>

<div class="card">
  <h1>⛽ Cargar Gas Oil - YPF Neuquén Capital</h1>
  
  <div class="info">
    <strong>Estrategia triple:</strong><br>
    1️⃣ <strong>API Secretaría Energía</strong> (datos.energia.gob.ar)<br>
    2️⃣ <strong>API datos.gob.ar</strong> (búsqueda series)<br>
    3️⃣ <strong>Gemini AI</strong> con prompt específico (YPF/ACA Neuquén)
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statG2">0</div>
      <div class="stat-lbl">Grado 2 (períodos)</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statG3">0</div>
      <div class="stat-lbl">Grado 3 (períodos)</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statSrc">-</div>
      <div class="stat-lbl">Fuente</div>
    </div>
  </div>
  
  <button onclick="cargarGasOil()" id="btnStart">▶️ Cargar Gas Oil</button>
  <button onclick="guardarBD()" id="btnSave" disabled>💾 Guardar en Supabase</button>
</div>

<div class="card">
  <h2 style="margin:0 0 12px;font-size:16px">📋 Log</h2>
  <div class="log" id="log">Esperando inicio...</div>
</div>

<script>
const CONFIG = {
  SB_URL: 'https://upxsqroxbvzwudcaklvn.supabase.co',
  SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweHNxcm94YnZ6d3VkY2FrbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg4NjYsImV4cCI6MjA5MTIzNDg2Nn0.EgXWuLg3ip66PnuCvK01XFj3QDMZDu7PDG21BwkzkNo',
  GEMINI_PROXY: 'https://upxsqroxbvzwudcaklvn.supabase.co/functions/v1/gemini-proxy',
  
  // Datasets de combustibles (CKAN datastore_search)
  DATASETS_CKAN: [
    'https://datos.energia.gob.ar/api/3/action/datastore_search?resource_id=80ac25de-a44a-4445-9215-090cf55cfda5&q=neuquen&limit=10000',
    'https://datos.gob.ar/api/3/action/datastore_search?resource_id=80ac25de-a44a-4445-9215-090cf55cfda5&q=neuquen&limit=10000'
  ],
  
  START_DATE: '2023-12'
};

let STORE = {};
let datosGasOil = {g2: {}, g3: {}}; // {ym: precio}

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  const icon = type === 'ok' ? '✅' : type === 'err' ? '❌' : type === 'warn' ? '⚠️' : 'ℹ️';
  el.textContent += `[${time}] ${icon} ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function updateStats(g2, g3, src) {
  document.getElementById('statG2').textContent = g2;
  document.getElementById('statG3').textContent = g3;
  if (src) document.getElementById('statSrc').textContent = src;
}

// ═══ ESTRATEGIA 1: CKAN Datastore Search ═══
async function intentarCKAN() {
  log('\n🔍 ESTRATEGIA 1: API CKAN datos.energia.gob.ar');
  
  for (const url of CONFIG.DATASETS_CKAN) {
    try {
      log(`   Probando: ${url.substring(0, 80)}...`);
      const r = await fetch(url);
      
      if (!r.ok) {
        log(`   ❌ Status ${r.status}`, 'err');
        continue;
      }
      
      const d = await r.json();
      
      if (!d.success) {
        log(`   ❌ API error`, 'err');
        continue;
      }
      
      const records = d.result?.records || [];
      log(`   ✅ ${records.length} registros recibidos`);
      
      if (records.length === 0) continue;
      
      // Mostrar estructura
      log(`   📋 Campos: ${Object.keys(records[0]).join(', ')}`);
      
      // Filtrar por YPF, Neuquén capital, Gasoil
      const filtrados = records.filter(r => {
        const empresa = (r.empresa || r.empresabandera || '').toString().toUpperCase();
        const provincia = (r.provincia || '').toString().toUpperCase();
        const localidad = (r.localidad || '').toString().toUpperCase();
        const producto = (r.producto || '').toString().toLowerCase();
        
        const esYPF = empresa.includes('YPF');
        const esNQN = provincia.includes('NEUQU') || localidad.includes('NEUQU');
        const esGasoil = producto.includes('gasoil') || producto.includes('diesel') || producto.includes('grado');
        
        return esYPF && esNQN && esGasoil;
      });
      
      log(`   📊 Filtrados YPF Neuquén Gasoil: ${filtrados.length}`);
      
      if (filtrados.length === 0) continue;
      
      // Procesar - separar G2 y G3
      filtrados.forEach(r => {
        const producto = (r.producto || '').toString().toLowerCase();
        const fecha = r.fecha_vigencia || r.fecha || '';
        const precio = parseFloat(r.precio || 0);
        
        if (!fecha || !precio) return;
        
        const ym = fecha.slice(0, 7);
        
        if (producto.includes('grado 2') || producto.includes('grado_2')) {
          if (!datosGasOil.g2[ym] || precio > datosGasOil.g2[ym]) {
            datosGasOil.g2[ym] = precio;
          }
        } else if (producto.includes('grado 3') || producto.includes('grado_3') || producto.includes('premium') || producto.includes('eurodiesel')) {
          if (!datosGasOil.g3[ym] || precio > datosGasOil.g3[ym]) {
            datosGasOil.g3[ym] = precio;
          }
        }
      });
      
      const g2Count = Object.keys(datosGasOil.g2).length;
      const g3Count = Object.keys(datosGasOil.g3).length;
      
      log(`   ✅ Procesados: G2=${g2Count}, G3=${g3Count}`);
      
      if (g2Count > 0 || g3Count > 0) {
        updateStats(g2Count, g3Count, 'CKAN');
        return true;
      }
      
    } catch (err) {
      log(`   ❌ Error: ${err.message}`, 'err');
    }
  }
  
  return false;
}

// ═══ ESTRATEGIA 2: Gemini AI con prompt específico ═══
async function callGemini(prompt) {
  for (let retry = 0; retry < 3; retry++) {
    try {
      const r = await fetch(CONFIG.GEMINI_PROXY, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + CONFIG.SB_KEY
        },
        body: JSON.stringify({parts: [{text: prompt}]})
      });
      
      if (r.status === 502 || r.status === 503) {
        await new Promise(res => setTimeout(res, 2000));
        continue;
      }
      
      if (!r.ok) throw new Error('Gemini ' + r.status);
      
      const data = await r.json();
      return (data?.candidates?.[0]?.content?.parts || [])
        .map(p => p.text || '')
        .join('\n')
        .trim();
    } catch (err) {
      if (retry === 2) throw err;
      await new Promise(res => setTimeout(res, 1200));
    }
  }
}

function parseJSON(txt) {
  if (!txt) return null;
  let raw = txt.replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
  const m = raw.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try {
    return JSON.parse(m[0].replace(/,\s*}/g, '}').replace(/,\s*]/g, ']'));
  } catch {
    return null;
  }
}

async function intentarGemini() {
  log('\n🤖 ESTRATEGIA 2: Gemini AI con prompt específico');
  
  // Generar lista de meses
  const inicio = new Date(CONFIG.START_DATE + '-01');
  const hoy = new Date();
  const meses = [];
  
  let current = new Date(inicio);
  while (current <= hoy) {
    meses.push(current.getFullYear() + '-' + String(current.getMonth() + 1).padStart(2, '0'));
    current.setMonth(current.getMonth() + 1);
  }
  
  log(`   Buscando ${meses.length} meses...`);
  
  for (const ym of meses) {
    // Si ya tenemos datos de CKAN, saltamos
    if (datosGasOil.g2[ym] && datosGasOil.g3[ym]) continue;
    
    const [year, month] = ym.split('-');
    const monthName = new Date(+year, +month - 1, 1).toLocaleDateString('es-AR', {month: 'long'});
    
    const prompt = `Necesito el precio promedio de combustibles en YPF Neuquén Capital, Argentina, para ${monthName} ${year} (${ym}).

Si YPF no está disponible, usa Automóvil Club Argentino (ACA) en Neuquén Capital.

Busca en:
- datos.energia.gob.ar (Secretaría de Energía)
- Informes mensuales de YPF (ypf.com)
- Publicaciones oficiales del Ministerio de Economía
- Ámbito Financiero, La Nación, Clarín (sección economía)

Productos:
- Gas Oil Grado 2 (Diesel común / Diesel 500)
- Gas Oil Grado 3 (Eurodiesel / Infinia Diesel / Premium)

Responde ÚNICAMENTE con JSON exacto:
{
  "ym": "${ym}",
  "g2_precio": <precio Grado 2 en pesos por litro>,
  "g3_precio": <precio Grado 3 en pesos por litro>,
  "fuente": "<URL o nombre fuente>"
}

Si solo encuentras uno, deja el otro en null.
Si no encuentras ninguno: {"ym":"${ym}","g2_precio":null,"g3_precio":null,"fuente":"No disponible"}`;

    log(`   Buscando ${ym}...`);
    
    try {
      const response = await callGemini(prompt);
      const data = parseJSON(response);
      
      if (data) {
        if (data.g2_precio !== null && !datosGasOil.g2[ym]) {
          datosGasOil.g2[ym] = Number(data.g2_precio);
          log(`     ✅ G2 ${ym}: $${data.g2_precio}`);
        }
        if (data.g3_precio !== null && !datosGasOil.g3[ym]) {
          datosGasOil.g3[ym] = Number(data.g3_precio);
          log(`     ✅ G3 ${ym}: $${data.g3_precio}`);
        }
        
        if (data.g2_precio === null && data.g3_precio === null) {
          log(`     ⚠️ ${ym}: Sin datos`, 'warn');
        }
      }
      
      updateStats(Object.keys(datosGasOil.g2).length, Object.keys(datosGasOil.g3).length, 'Gemini AI');
      
    } catch (err) {
      log(`     ❌ Error ${ym}: ${err.message}`, 'err');
    }
    
    await new Promise(r => setTimeout(r, 800));
  }
}

// ═══ MAIN ═══
async function cargarGasOil() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('log').textContent = '';
  
  log('🚀 Iniciando carga Gas Oil...');
  
  // 1. Cargar Supabase
  log('\n📥 Paso 1: Cargando estado actual...');
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY
    };
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id,datos&limit=1`, {headers});
    const rows = await r.json();
    
    if (!rows.length) {
      log('❌ No se encontró registro', 'err');
      return;
    }
    
    STORE = JSON.parse(rows[0].datos);
    log(`✅ Cargado registro ID: ${rows[0].id}`);
    log(`   Gas Oil G2 actual: ${STORE.go_g2?.rows?.length || 0} períodos`);
    log(`   Gas Oil G3 actual: ${STORE.go_g3?.rows?.length || 0} períodos`);
    
  } catch (err) {
    log(`❌ Error: ${err.message}`, 'err');
    return;
  }
  
  // 2. Estrategia CKAN
  const ckanOk = await intentarCKAN();
  
  // 3. Estrategia Gemini AI (complementa)
  await intentarGemini();
  
  // 4. Construir rows
  log('\n📊 Construyendo IDX_STORE...');
  
  const buildRows = (datos) => {
    const meses = Object.keys(datos).sort();
    return meses.map((ym, i) => {
      const valor = datos[ym];
      let pct = null;
      
      if (i > 0) {
        const prev = datos[meses[i - 1]];
        if (prev && prev > 0) {
          pct = Number((((valor / prev) - 1) * 100).toFixed(2));
        }
      }
      
      return {
        ym,
        pct,
        value: Number(valor.toFixed(2)),
        publishedAt: null,
        source: 'API/AI',
        confirmed: false
      };
    });
  };
  
  const rowsG2 = buildRows(datosGasOil.g2);
  const rowsG3 = buildRows(datosGasOil.g3);
  
  log(`   Gas Oil G2: ${rowsG2.length} períodos`);
  log(`   Gas Oil G3: ${rowsG3.length} períodos`);
  
  if (rowsG2.length > 0) {
    log(`     Primero: ${rowsG2[0].ym} → $${rowsG2[0].value}`);
    log(`     Último:  ${rowsG2[rowsG2.length-1].ym} → $${rowsG2[rowsG2.length-1].value}`);
  }
  
  STORE.go_g2 = {rows: rowsG2};
  STORE.go_g3 = {rows: rowsG3};
  
  log(`\n🎉 LISTO PARA GUARDAR`);
  
  if (rowsG2.length > 0 || rowsG3.length > 0) {
    document.getElementById('btnSave').disabled = false;
  } else {
    log('⚠️ No se pudieron obtener datos', 'warn');
  }
}

async function guardarBD() {
  document.getElementById('btnSave').disabled = true;
  log('\n💾 Guardando en Supabase...');
  
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    
    const check = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id&limit=1`, {headers});
    const existing = await check.json();
    
    const payload = {datos: JSON.stringify(STORE)};
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?id=eq.${existing[0].id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify(payload)
    });
    
    if (!r.ok) throw new Error('Supabase ' + r.status);
    
    log('✅ Guardado exitoso', 'ok');
    log('\n🎊 PROCESO COMPLETO');
    log('   → Recargá index.html');
    log('   → Gas Oil debe mostrar datos actualizados');
    
  } catch (err) {
    log(`❌ Error: ${err.message}`, 'err');
    document.getElementById('btnSave').disabled = false;
  }
}
</script>
