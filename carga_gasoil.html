<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cargar Gas Oil - YPF Neuquén</title>
<style>
body{font-family:system-ui;padding:40px;max-width:900px;margin:0 auto;background:#f5f5f5}
.card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}

button{background:#0066cc;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px}
button:hover{background:#0052a3}
button:disabled{opacity:.5;cursor:not-allowed}
.log{background:#f8f9fa;border:1px solid #dee2e6;border-radius:6px;padding:16px;font-family:monospace;font-size:12px;max-height:500px;overflow-y:auto;white-space:pre-wrap}
.info{background:#d1ecf1;border-left:4px solid #0c5460;padding:12px;margin:12px 0;border-radius:4px;font-size:13px;color:#0c5460}

.stat-num{font-size:24px;font-weight:700;color:#0066cc}
.stat-lbl{font-size:11px;color:#666;text-transform:uppercase;margin-top:4px}
</style>
</head>
<body>

<div class="card">
  <h1>⛽ Cargar Gas Oil - YPF Neuquén Capital</h1>
  
  <div class="info">
    <strong>Estrategia triple:</strong><br>
    1️⃣ <strong>API Secretaría Energía</strong> (datos.energia.gob.ar)<br>
    2️⃣ <strong>API datos.gob.ar</strong> (búsqueda series)<br>

  <button onclick="cargarGasOil()" id="btnStart">▶️ Cargar Gas Oil</button>
  <button onclick="guardarBD()" id="btnSave" disabled>💾 Guardar en Supabase</button>
</div>

<div class="card">
  <h2 style="margin:0 0 12px;font-size:16px">📋 Log</h2>
  <div class="log" id="log">Esperando inicio...</div>
</div>

<script>
const CONFIG = {
  SB_URL: 'https://upxsqroxbvzwudcaklvn.supabase.co',
  SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweHNxcm94YnZ6d3VkY2FrbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg4NjYsImV4cCI6MjA5MTIzNDg2Nn0.EgXWuLg3ip66PnuCvK01XFj3QDMZDu7PDG21BwkzkNo',
  GEMINI_PROXY: 'https://upxsqroxbvzwudcaklvn.supabase.co/functions/v1/gemini-proxy',
  
  // CSVs DIRECTOS Secretaría de Energía - actualizado 23/04/2026
  CSV_HISTORICO: 'http://datos.energia.gob.ar/dataset/1c181390-5045-475e-94dc-410429be4b17/resource/f8dda0d5-2a9f-4d34-b79b-4e63de3995df/download/precios-historicos.csv',
  CSV_VIGENTES:  'http://datos.energia.gob.ar/dataset/1c181390-5045-475e-94dc-410429be4b17/resource/80ac25de-a44a-4445-9215-090cf55cfda5/download/precios-en-surtidor-resolucin-3142016.csv',
  
  START_DATE: '2023-12'
};

let STORE = {};
let datosGasOil = {g2: {}, g3: {}}; // {ym: precio}

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  const icon = type === 'ok' ? '✅' : type === 'err' ? '❌' : type === 'warn' ? '⚠️' : 'ℹ️';
  el.textContent += `[${time}] ${icon} ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function updateStats(g2, g3, src) {
  document.getElementById('statG2').textContent = g2;
  document.getElementById('statG3').textContent = g3;
  if (src) document.getElementById('statSrc').textContent = src;
}

// ═══ PARSEAR CSV ═══
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  
  // Detectar separador (coma o punto y coma)
  const header = lines[0];
  const sep = header.includes(';') ? ';' : ',';
  
  const cols = header.split(sep).map(c => c.trim().replace(/"/g, '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // sin tildes
  );
  
  log(`   Columnas: ${cols.join(' | ')}`);
  
  return lines.slice(1).map(line => {
    const vals = line.split(sep).map(v => v.trim().replace(/"/g, ''));
    const obj = {};
    cols.forEach((col, i) => { obj[col] = vals[i] || ''; });
    return obj;
  });
}

// ═══ FILTRAR REGISTROS GAS OIL NEUQUÉN ═══
function filtrarGasOil(records) {
  return records.filter(r => {
    // Normalizar texto
    const prov = (r.provincia || r.idprovincia || '').toString().toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const loc = (r.localidad || '').toString().toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const empresa = (r.empresa || r.razon_social || r.empresabandera || r.idempresa || '').toString().toUpperCase();
    const producto = (r.producto || r.idproducto || '').toString().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    
    const esNQN = prov.includes('NEUQU') || prov === '58' || prov === '30'; // código Neuquén
    const esCapital = loc.includes('NEUQU') || loc === '' || !loc;
    const esYPF = empresa.includes('YPF') || empresa.includes('YPFC');
    const esACA = empresa.includes('ACA') || empresa.includes('AUTOMOVIL');
    const esGasoil = producto.includes('gasoil') || producto.includes('diesel') || producto.includes('gas oil');
    
    return esNQN && (esYPF || esACA) && esGasoil;
  });
}

// ═══ PROXY FETCH (via energia-proxy Edge Function) ═══
async function proxyFetch(url) {
  const r = await fetch(CONFIG.ENERGIA_PROXY, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + CONFIG.SB_KEY
    },
    body: JSON.stringify({ url })
  });
  if (!r.ok) throw new Error(`Proxy HTTP ${r.status}`);
  return r;
}

// ═══ PROCESAR RECORDS FILTRADOS ═══
function procesarRecords(filtrados, fuente) {
  let procesados = 0;
  filtrados.forEach(r => {
    const producto = (r.producto || r.idproducto || '').toString().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const fecha = (r.fecha_vigencia || r.fechavigencia || r.fecha || r.vigdesde || '').toString();
    const precio = parseFloat((r.precio || r.importe || '0').toString().replace(',', '.'));

    if (!fecha || !precio || precio <= 0) return;
    const ym = fecha.slice(0, 7);
    if (!ym || ym < CONFIG.START_DATE) return;

    const esG2 = producto.includes('grado 2') || producto.includes('grado_2') ||
                 producto.includes('comun') || producto.includes('común') ||
                 producto.includes('500') || producto.includes('g2');
    const esG3 = producto.includes('grado 3') || producto.includes('grado_3') ||
                 producto.includes('premium') || producto.includes('ultra') ||
                 producto.includes('euro') || producto.includes('infinia') || producto.includes('g3');

    if (esG2) { if (!datosGasOil.g2[ym] || precio > datosGasOil.g2[ym]) { datosGasOil.g2[ym] = precio; procesados++; } }
    else if (esG3) { if (!datosGasOil.g3[ym] || precio > datosGasOil.g3[ym]) { datosGasOil.g3[ym] = precio; procesados++; } }
  });
  return procesados;
}

// ═══ ESTRATEGIA 1: CKAN VÍA energia-proxy ═══
async function intentarCSV() {
  const endpoints = [
    { url: CONFIG.CKAN_HISTORICO, nombre: 'CKAN Histórico' },
    { url: CONFIG.CKAN_VIGENTES,  nombre: 'CKAN Vigentes'  }
  ];

  for (const { url, nombre } of endpoints) {
    log(`\n🔗 ${nombre} vía energia-proxy...`);
    try {
      const resp = await proxyFetch(url);
      const json = await resp.json();

      if (!json.success) { log(`   ❌ CKAN error: ${json.error?.message}`, 'err'); continue; }

      const total = json.result?.total || 0;
      let records = json.result?.records || [];
      log(`   📊 Total dataset: ${total} | Página: ${records.length}`);
      if (records.length === 0) continue;

      log(`   📋 Muestra: ${JSON.stringify(records[0]).substring(0, 200)}`);

      // Paginar si hay más registros
      let offset = records.length;
      while (offset < total) {
        log(`   🔄 Paginando offset=${offset}...`);
        const pr = await proxyFetch(url + `&offset=${offset}`);
        const pj = await pr.json();
        const page = pj.result?.records || [];
        if (page.length === 0) break;
        records = records.concat(page);
        offset += page.length;
        await new Promise(res => setTimeout(res, 300));
      }

      log(`   📊 Total registros descargados: ${records.length}`);

      const filtrados = filtrarGasOil(records);
      log(`   🔍 YPF/ACA Neuquén Gasoil: ${filtrados.length}`);

      if (filtrados.length === 0) {
        const provs = [...new Set(records.slice(0, 500).map(r => r.provincia || r.idprovincia || ''))].slice(0, 10);
        const prods = [...new Set(records.slice(0, 500).map(r => r.producto || r.idproducto || ''))].slice(0, 10);
        log(`   ⚠️ Provincias: ${provs.join(', ')}`, 'warn');
        log(`   ⚠️ Productos: ${prods.join(', ')}`, 'warn');
        continue;
      }

      const procesados = procesarRecords(filtrados, nombre);
      const g2 = Object.keys(datosGasOil.g2).length;
      const g3 = Object.keys(datosGasOil.g3).length;
      log(`   ✅ Procesados ${procesados} → G2=${g2} períodos, G3=${g3} períodos`);
      updateStats(g2, g3, nombre);

    } catch (err) {
      log(`   ❌ Error: ${err.message}`, 'err');
    }
  }

  return Object.keys(datosGasOil.g2).length > 0 || Object.keys(datosGasOil.g3).length > 0;
}

// ═══ ESTRATEGIA 2: Gemini AI con prompt específico ═══
async function callGemini(prompt) {
  for (let retry = 0; retry < 3; retry++) {
    try {
      const r = await fetch(CONFIG.GEMINI_PROXY, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + CONFIG.SB_KEY
        },
        body: JSON.stringify({parts: [{text: prompt}]})
      });
      
      if (r.status === 502 || r.status === 503) {
        await new Promise(res => setTimeout(res, 2000));
        continue;
      }
      
      if (!r.ok) throw new Error('Gemini ' + r.status);
      
      const data = await r.json();
      return (data?.candidates?.[0]?.content?.parts || [])
        .map(p => p.text || '')
        .join('\n')
        .trim();
    } catch (err) {
      if (retry === 2) throw err;
      await new Promise(res => setTimeout(res, 1200));
    }
  }
}

function parseJSON(txt) {
  if (!txt) return null;
  let raw = txt.replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
  const m = raw.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try {
    return JSON.parse(m[0].replace(/,\s*}/g, '}').replace(/,\s*]/g, ']'));
  } catch {
    return null;
  }
}

async function intentarGemini() {
  log('\n🤖 ESTRATEGIA 2: Gemini AI con prompt específico');
  
  // Generar lista de meses
  const inicio = new Date(CONFIG.START_DATE + '-01');
  const hoy = new Date();
  const meses = [];
  
  let current = new Date(inicio);
  while (current <= hoy) {
    meses.push(current.getFullYear() + '-' + String(current.getMonth() + 1).padStart(2, '0'));
    current.setMonth(current.getMonth() + 1);
  }
  
  log(`   Buscando ${meses.length} meses...`);
  
  for (const ym of meses) {
    // Si ya tenemos datos de CKAN, saltamos
    if (datosGasOil.g2[ym] && datosGasOil.g3[ym]) continue;
    
    const [year, month] = ym.split('-');
    const monthName = new Date(+year, +month - 1, 1).toLocaleDateString('es-AR', {month: 'long'});
    
    const prompt = `Eres experto en precios de combustibles Argentina. Necesito datos históricos reales.

DATOS REQUERIDOS: Precio Gas Oil en YPF Neuquén Capital (o ACA Neuquén) para ${monthName} ${year} (${ym}).

REFERENCIA DE PRECIOS PARA CALIBRAR TU RESPUESTA:
- Nov 2023: G2~$405, G3~$510
- Dic 2023: G2~$524, G3~$660 (devaluación Milei)
- Ene 2024: G2~$700, G3~$870
- Feb 2024: G2~$800, G3~$980
- Mar 2024: G2~$910, G3~$1100
- Jun 2024: G2~$909, G3~$1080
- Los precios siguieron subiendo en 2024 (IPC ~10-15%/mes) y 2025 (~3-5%/mes)

Estima para ${ym} usando evolución inflacionaria si no tienes dato exacto.
Responde ÚNICAMENTE JSON sin markdown:
{"ym":"${ym}","g2_precio":<número>,"g3_precio":<número>,"fuente":"<fuente>"}
Si no podés estimar: {"ym":"${ym}","g2_precio":null,"g3_precio":null,"fuente":"No disponible"}`;

    log(`   Buscando ${ym}...`);
    
    try {
      const response = await callGemini(prompt);
      const data = parseJSON(response);
      
      if (data) {
        if (data.g2_precio !== null && !datosGasOil.g2[ym]) {
          datosGasOil.g2[ym] = Number(data.g2_precio);
          log(`     ✅ G2 ${ym}: $${data.g2_precio}`);
        }
        if (data.g3_precio !== null && !datosGasOil.g3[ym]) {
          datosGasOil.g3[ym] = Number(data.g3_precio);
          log(`     ✅ G3 ${ym}: $${data.g3_precio}`);
        }
        
        if (data.g2_precio === null && data.g3_precio === null) {
          log(`     ⚠️ ${ym}: Sin datos`, 'warn');
        }
      }
      
      updateStats(Object.keys(datosGasOil.g2).length, Object.keys(datosGasOil.g3).length, 'Gemini AI');
      
    } catch (err) {
      log(`     ❌ Error ${ym}: ${err.message}`, 'err');
    }
    
    await new Promise(r => setTimeout(r, 800));
  }
}

// ═══ MAIN ═══
async function cargarGasOil() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('log').textContent = '';
  
  log('🚀 Iniciando carga Gas Oil...');
  
  // 1. Cargar Supabase
  log('\n📥 Paso 1: Cargando estado actual...');
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY
    };
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id,datos&limit=1`, {headers});
    const rows = await r.json();
    
    if (!rows.length) {
      log('❌ No se encontró registro', 'err');
      return;
    }
    
    STORE = JSON.parse(rows[0].datos);
    log(`✅ Cargado registro ID: ${rows[0].id}`);
    log(`   Gas Oil G2 actual: ${STORE.go_g2?.rows?.length || 0} períodos`);
    log(`   Gas Oil G3 actual: ${STORE.go_g3?.rows?.length || 0} períodos`);
    
  } catch (err) {
    log(`❌ Error: ${err.message}`, 'err');
    return;
  }
  
  // 2. Estrategia CSV oficial
  const csvOk = await intentarCSV();
  
  // 3. Estrategia Gemini AI (complementa gaps)
  await intentarGemini();
  
  // 4. Construir rows
  log('\n📊 Construyendo IDX_STORE...');
  
  const buildRows = (datos) => {
    const meses = Object.keys(datos).sort();
    return meses.map((ym, i) => {
      const valor = datos[ym];
      let pct = null;
      
      if (i > 0) {
        const prev = datos[meses[i - 1]];
        if (prev && prev > 0) {
          pct = Number((((valor / prev) - 1) * 100).toFixed(2));
        }
      }
      
      return {
        ym,
        pct,
        value: Number(valor.toFixed(2)),
        publishedAt: null,
        source: 'API/AI',
        confirmed: false
      };
    });
  };
  
  const rowsG2 = buildRows(datosGasOil.g2);
  const rowsG3 = buildRows(datosGasOil.g3);
  
  log(`   Gas Oil G2: ${rowsG2.length} períodos`);
  log(`   Gas Oil G3: ${rowsG3.length} períodos`);
  
  if (rowsG2.length > 0) {
    log(`     Primero: ${rowsG2[0].ym} → $${rowsG2[0].value}`);
    log(`     Último:  ${rowsG2[rowsG2.length-1].ym} → $${rowsG2[rowsG2.length-1].value}`);
  }
  
  STORE.go_g2 = {rows: rowsG2};
  STORE.go_g3 = {rows: rowsG3};
  
  log(`\n🎉 LISTO PARA GUARDAR`);
  
  if (rowsG2.length > 0 || rowsG3.length > 0) {
    document.getElementById('btnSave').disabled = false;
  } else {
    log('⚠️ No se pudieron obtener datos', 'warn');
  }
}

async function guardarBD() {
  document.getElementById('btnSave').disabled = true;
  log('\n💾 Guardando en Supabase...');
  
  try {
    const headers = {
      'apikey': CONFIG.SB_KEY,
      'Authorization': 'Bearer ' + CONFIG.SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    
    const check = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?select=id&limit=1`, {headers});
    const existing = await check.json();
    
    const payload = {datos: JSON.stringify(STORE)};
    
    const r = await fetch(`${CONFIG.SB_URL}/rest/v1/indices?id=eq.${existing[0].id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify(payload)
    });
    
    if (!r.ok) throw new Error('Supabase ' + r.status);
    
    log('✅ Guardado exitoso', 'ok');
    log('\n🎊 PROCESO COMPLETO');
    log('   → Recargá index.html');
    log('   → Gas Oil debe mostrar datos actualizados');
    
  } catch (err) {
    log(`❌ Error: ${err.message}`, 'err');
    document.getElementById('btnSave').disabled = false;
  }
}
</script>
