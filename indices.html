<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargador de Índices v2 OPTIMIZADO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --p900:#14303a;--p800:#1c4252;--p700:#24566c;--p600:#3E8095;--p500:#4c96ad;
  --p400:#6db1c4;--p300:#92c8d6;--p200:#AED0DD;--p100:#d6e9f0;--p50:#eef6f9;
  --r500:#dc3545;--r100:#fde8ea;--g600:#198754;--g100d:#d1f5e0;
  --a500:#f59e0b;--a100:#fef3cd;--b500:#3b82f6;--b100:#dbeafe;
  --pur:#7c3aed;--pur100:#ede9fe;
  --w:#fff;--g50:#f8f9fa;--g100:#f1f3f5;--g200:#e9ecef;--g300:#dee2e6;
  --g400:#ced4da;--g500:#adb5bd;--g600c:#6c757d;--g700:#495057;--g800:#343a40;--g900:#212529;
  --rad:8px;--radl:14px;--sh:0 2px 8px rgba(0,0,0,.06);--shm:0 4px 16px rgba(0,0,0,.10)
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--g100);color:var(--g900);min-height:100vh}

.topbar{background:linear-gradient(135deg,var(--p900) 0%,var(--p700) 100%);color:var(--w);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-logo{width:34px;height:34px;background:var(--p500);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;line-height:1.2}
.tb-title span{font-size:10.5px;font-weight:400;opacity:.55;display:block;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sb-badge{font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.2)}
.sb-badge.ok{background:rgba(25,135,84,.3);color:#6ee7b7}
.sb-badge.err{background:rgba(220,53,69,.3);color:#fca5a5}

.ctrl-bar{background:var(--w);border-bottom:2px solid var(--g200);padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ctrl-lbl{font-size:11px;font-weight:700;color:var(--g700);text-transform:uppercase;letter-spacing:.5px}
input[type=month]{font-family:inherit;font-size:13px;padding:7px 10px;border:1.5px solid var(--g300);border-radius:6px;background:var(--w);color:var(--g900);outline:none;transition:.12s}
input[type=month]:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(62,128,149,.1)}
.ctrl-sep{color:var(--g400);font-size:14px}
.ctrl-divider{width:1px;height:26px;background:var(--g200);flex-shrink:0}

.status-bar{padding:7px 24px;font-size:12px;display:flex;align-items:center;gap:8px}
.status-bar.ok{background:var(--g100d);color:#166534}
.status-bar.err{background:var(--r100);color:var(--r500)}
.status-bar.info{background:var(--p50);color:var(--p700)}
.status-bar.warn{background:var(--a100);color:#92400e}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ok .status-dot{background:var(--g600)}.err .status-dot{background:var(--r500)}.info .status-dot{background:var(--p500)}.warn .status-dot{background:var(--a500)}

/* AI PANEL */
.ai-panel{background:var(--w);border-bottom:2px solid var(--pur100);padding:16px 24px;display:none}
.ai-panel.vis{display:block}
.ai-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.ai-panel-hdr h3{font-size:14px;font-weight:700;color:var(--pur);display:flex;align-items:center;gap:7px}
.ai-prog-wrap{background:var(--g100);border-radius:var(--rad);padding:4px;margin-bottom:10px}
.ai-prog-bar{height:8px;border-radius:6px;background:linear-gradient(90deg,var(--pur),#a855f7);transition:width .4s;width:0%}
.ai-log{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;padding:2px 0}
.ai-log-row{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:4px 8px;border-radius:5px}
.ai-log-row.pending{color:var(--g500)}
.ai-log-row.running{color:var(--p700);background:var(--p50);animation:pulse .8s ease infinite}
.ai-log-row.found{color:#166534;background:var(--g100d)}
.ai-log-row.api{color:#1e3a8a;background:var(--b100);font-weight:600}
.ai-log-row.manual{color:#92400e;background:var(--a100)}
.ai-log-row.failed{color:var(--r500);background:var(--r100)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.ai-log-ico{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.ai-log-name{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ai-log-ym{font-size:10.5px;color:var(--g600c);flex-shrink:0}
.ai-log-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;flex-shrink:0;margin-left:4px}
.ai-log-note{font-size:9px;color:var(--g500);margin-left:4px}
.ai-stats{display:flex;gap:8px;flex-wrap:wrap}
.ai-stat{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.ai-stat.ok{background:var(--g100d);color:#166534}
.ai-stat.warn{background:var(--a100);color:#92400e}
.ai-stat.info{background:var(--pur100);color:var(--pur)}

.main{padding:18px 24px}
.cat-sec{margin-bottom:24px}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--g200)}
.cat-hdr h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--p800)}
.cat-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:9.5px;font-weight:700;text-transform:uppercase}
.cat-pill.mo{background:#ede9fe;color:#5b21b6}
.cat-pill.ipc{background:var(--g100d);color:var(--g600)}
.cat-pill.ipim{background:var(--p100);color:var(--p700)}
.cat-pill.fuel{background:#fef9c3;color:#713f12}
.cat-pill.usd{background:var(--b100);color:#1e3a8a}

.grid-wrap{overflow-x:auto;border-radius:var(--rad);box-shadow:var(--sh)}
.grid-tbl{border-collapse:collapse;width:100%;min-width:500px}
.grid-tbl th{background:var(--p800);color:var(--w);padding:8px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:center;white-space:nowrap}
.grid-tbl th.th-idx{text-align:left;min-width:185px;position:sticky;left:0;z-index:2;background:var(--p900)}
.grid-tbl td{padding:5px 6px;border-bottom:1px solid var(--g100);border-right:1px solid var(--g100);text-align:center;vertical-align:middle;background:var(--w)}
.grid-tbl tr:hover td{background:var(--p50)}
.grid-tbl td.td-idx{text-align:left;font-size:12px;font-weight:600;color:var(--p900);padding:8px 12px;white-space:nowrap;position:sticky;left:0;z-index:1;background:var(--g50);border-right:2px solid var(--g200)}
.grid-tbl tr:hover td.td-idx{background:var(--p50)}
.td-src{font-size:10px;color:var(--g500);font-weight:400;margin-top:1px}

.cell-inp{font-family:'JetBrains Mono',monospace;font-size:12px;width:76px;padding:4px 6px;border:1.5px solid var(--g200);border-radius:5px;text-align:center;background:var(--w);color:var(--g900);outline:none;transition:.15s}
.cell-inp:focus{border-color:var(--p500);box-shadow:0 0 0 2px rgba(62,128,149,.12)}
.cell-inp.has-val{border-color:var(--p300);background:var(--p50)}
.cell-inp.confirmed{border-color:var(--g600);background:var(--g100d)}
.cell-inp.ai-found{border-color:var(--pur);background:var(--pur100)}
.cell-inp.api-found{border-color:#1e3a8a;background:var(--b100);font-weight:600}
.cell-inp.need-manual{border-color:var(--a500);background:var(--a100);animation:blink-a 1.8s ease infinite}
.cell-inp.usd-w{width:90px}
@keyframes blink-a{0%,100%{border-color:var(--a500)}50%{border-color:rgba(245,158,11,.35)}}
.cell-chk{accent-color:var(--g600);width:13px;height:13px;cursor:pointer}

.btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.12s;white-space:nowrap;line-height:1}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-p{background:var(--p600);color:var(--w)}.btn-p:hover:not(:disabled){background:var(--p700)}
.btn-g{background:var(--g600);color:var(--w)}.btn-g:hover:not(:disabled){background:#157347}
.btn-s{background:var(--g200);color:var(--g800)}.btn-s:hover:not(:disabled){background:var(--g300)}
.btn-d{background:var(--r500);color:var(--w)}.btn-d:hover:not(:disabled){background:#bb2d3b}
.btn-ai{background:var(--pur);color:var(--w)}.btn-ai:hover:not(:disabled){background:#6d28d9}
.btn-sm{font-size:11px;padding:5px 10px}

.toast{position:fixed;bottom:24px;right:24px;background:var(--g900);color:var(--w);padding:12px 18px;border-radius:var(--rad);font-size:13px;font-weight:600;box-shadow:var(--shm);z-index:300;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0);pointer-events:auto}
.toast.ok{background:var(--g600)}.toast.er{background:var(--r500)}.toast.info{background:var(--p600)}.toast.ai{background:var(--pur)}

.loader-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);z-index:400;display:none;align-items:center;justify-content:center}
.loader-ov.show{display:flex}
.loader-box{background:var(--w);padding:24px 32px;border-radius:var(--radl);box-shadow:var(--shm);text-align:center}
.loader-spin{width:40px;height:40px;border:4px solid var(--g200);border-top-color:var(--p600);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:14px;color:var(--g700);font-weight:600}

.selector-wrap{background:var(--w);border-bottom:2px solid var(--pur100);padding:16px 24px}
.selector-hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.selector-hdr h3{font-size:13px;font-weight:700;color:var(--pur)}
.selector-stats{font-size:11px;color:var(--g600c)}
.selector-btns{display:flex;gap:6px;flex-wrap:wrap}
.selector-list{display:flex;gap:6px;flex-wrap:wrap}
.sel-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;border:1.5px solid var(--g300);background:var(--g50);font-size:11.5px;font-weight:600;color:var(--g700);cursor:pointer;transition:.12s}
.sel-chip:hover{background:var(--g200)}
.sel-chip.active{background:var(--pur100);border-color:var(--pur);color:var(--pur)}
.sel-chip input{margin:0}
.sel-chip small{font-size:9px;background:var(--g300);color:var(--g700);padding:1px 5px;border-radius:99px;font-weight:700}
.sel-chip.active small{background:var(--pur);color:var(--w)}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-logo">📊</div>
    <div class="tb-title">Migrador de Índices v2<span>OPTIMIZADO · INDEC API + Gemini IA</span></div>
  </div>
  <div class="tb-right">
    <span class="sb-badge ok" id="sbBadge">⬤ Iniciando</span>
  </div>
</div>

<div class="ctrl-bar">
  <span class="ctrl-lbl">Período</span>
  <input type="month" id="ctrlFrom">
  <span class="ctrl-sep">→</span>
  <input type="month" id="ctrlTo">
  <button class="btn btn-p btn-sm" onclick="applyRange()">📅 Aplicar</button>
  <div class="ctrl-divider"></div>
  <button class="btn btn-g btn-sm" onclick="saveToSupabase()">💾 Guardar</button>
  <button class="btn btn-s btn-sm" onclick="exportJSON()">📥 Export JSON</button>
  <button class="btn btn-ai btn-sm" onclick="startAISearch()" id="btnAI">🤖 Buscar con IA</button>
</div>

<div class="selector-wrap">
  <div class="selector-hdr">
    <h3>🎯 Selección de índices automáticos</h3>
    <span class="selector-stats" id="selStats">—</span>
    <div class="selector-btns">
      <button class="btn btn-s btn-sm" onclick="selectAllAuto()">☑️ Todos</button>
      <button class="btn btn-s btn-sm" onclick="clearSelectedAuto()">🧹 Limpiar</button>
    </div>
  </div>
  <div class="selector-list" id="selectorList"></div>
</div>

<div class="status-bar info" id="statusBar">
  <div class="status-dot"></div>
  <span id="statusMsg">Iniciando...</span>
</div>

<div class="ai-panel" id="aiPanel">
  <div class="ai-panel-hdr">
    <h3>🤖 Búsqueda masiva con IA <span id="aiSub" style="font-size:11px;font-weight:400;color:var(--g600c);margin-left:4px"></span></h3>
    <div class="ai-stats" id="aiStats"></div>
    <div style="display:flex;gap:7px;flex-shrink:0">
      <button class="btn btn-d btn-sm" id="btnStop" onclick="stopAI()" style="display:none">⏹ Detener</button>
      <button class="btn btn-s btn-sm" onclick="document.getElementById('aiPanel').classList.remove('vis')">✕</button>
    </div>
  </div>
  <div class="ai-prog-wrap"><div class="ai-prog-bar" id="aiBar"></div></div>
  <div class="ai-log" id="aiLog"></div>
</div>

<div class="main" id="mainContent"><div style="text-align:center;padding:40px;color:var(--g500)">Cargando...</div></div>

<div class="toast" id="toast"></div>
<div class="loader-ov" id="loaderOv"><div class="loader-box"><div class="loader-spin"></div><div class="loader-msg" id="loaderMsg">Cargando...</div></div></div>

<script>
// ═══════════════ CONFIG ═══════════════
const SB_URL = 'https://upxsqroxbvzwudcaklvn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweHNxcm94YnZ6d3VkY2FrbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg4NjYsImV4cCI6MjA5MTIzNDg2Nn0.EgXWuLg3ip66PnuCvK01XFj3QDMZDu7PDG21BwkzkNo';
const SB_HDR = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const GEMINI_PROXY = `${SB_URL}/functions/v1/gemini-proxy`;

// ═══════════════ CATÁLOGO ═══════════════
const IDX_CATALOG = [
  {id:'ipc_nac',    name:'IPC Nacional (Nivel General)',    cat:'ipc',  src:'INDEC'},
  {id:'ipc_gba',    name:'IPC GBA (Nivel General)',         cat:'ipc',  src:'INDEC'},
  {id:'ipc_pat',    name:'IPC Patagonia (Nivel General)',   cat:'ipc',  src:'INDEC'},
  {id:'ipc_nqn',    name:'IPC NQN (Nivel General)',         cat:'ipc',  src:'DPEyC NQN'},
  {id:'ipc_nqnab',  name:'IPC NQN (Alim. y Bebidas)',       cat:'ipc',  src:'DPEyC NQN'},
  {id:'ipim_gral',  name:'IPIM (Nivel General)',             cat:'ipim', src:'INDEC'},
  {id:'ipim_r29',   name:'IPIM R29 (Refinados Petróleo)',   cat:'ipim', src:'INDEC'},
  {id:'fadeaac',    name:'FADEAAC (Equipo Vial)',            cat:'ipim', src:'FADEAAC'},
  {id:'go_g2',      name:'Gas Oil Grado 2 YPF NQN',         cat:'fuel', src:'YPF'},
  {id:'go_g3',      name:'Gas Oil Grado 3 YPF NQN',         cat:'fuel', src:'YPF'},
  {id:'usd_div',    name:'USD DIVISA (TC Vendedor)',         cat:'usd',  src:'BCRA'},
  {id:'usd_bill',   name:'USD BILLETE (TC Vendedor)',        cat:'usd',  src:'BCRA'},
  {id:'mo_pp',      name:'Petroleros Privados (SINPEP)',     cat:'mo',   src:'RRLL', cct:'CCT N°396/04'},
  {id:'mo_pj',      name:'Petroleros Jerárquicos (ASIMRA)', cat:'mo',   src:'RRLL', cct:'CCT N°644/12'},
];
const CAT_ORDER = ['ipc','ipim','fuel','usd','mo'];
const CAT_LABEL = {
  ipc:'IPC — Índice de Precios al Consumidor',
  ipim:'IPIM / FADEAAC — Precios Internos Mayoristas',
  fuel:'Combustible',
  usd:'USD / Tipo de Cambio',
  mo:'Mano de Obra — CCT (carga manual)'
};

// ═══════════════ STATE ═══════════════
let IDX_STORE = {};
let SB_ROW_ID = null;
let SB_OK     = false;
let _months   = [];
let _meta     = {};
let _aiStop   = false;
let _selectedIdx = new Set(IDX_CATALOG.filter(d=>d.cat!=='mo').map(d=>d.id));

// ═══════════════ UTILS ═══════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmtM(ym){if(!ym)return'—';try{const[y,m]=ym.split('-');return new Date(+y,+m-1,1).toLocaleDateString('es-AR',{month:'short',year:'2-digit'}).replace(' ','\'');}catch{return ym;}}
function fmtMF(ym){if(!ym)return'—';try{const[y,m]=ym.split('-');return new Date(+y,+m-1,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});}catch{return ym;}}
function pF(v){if(v==null||v==='')return'';return(+v>0?'+':'')+Number(v).toFixed(2)+'%';}
const isUsd = def => def.cat==='usd';
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function buildRange(from,to){
  const out=[];let c=new Date(from+'-01');const e=new Date(to+'-01');
  while(c<=e){out.push(c.getFullYear()+'-'+String(c.getMonth()+1).padStart(2,'0'));c.setMonth(c.getMonth()+1);}
  return out;
}
function idxRows(id){return (IDX_STORE[id]||{}).rows||[];}
function idxGet(id,ym){return idxRows(id).find(r=>r.ym===ym)||null;}
function idxSet(id,row){
  if(!IDX_STORE[id])IDX_STORE[id]={rows:[]};
  if(!Array.isArray(IDX_STORE[id].rows))IDX_STORE[id].rows=[];
  const rows=IDX_STORE[id].rows;
  const i=rows.findIndex(r=>r.ym===row.ym);
  if(i>=0)rows[i]={...rows[i],...row};
  else{rows.push(row);rows.sort((a,b)=>a.ym.localeCompare(b.ym));}
}

// ═══════════════ SUPABASE ═══════════════
async function sbFetch(table,method,body,filter=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}${filter}`,{method,headers:SB_HDR,body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(`${method} ${table} ${r.status}`);
  return method==='DELETE'?null:r.json();
}

async function loadFromSupabase(){
  showLoader('Conectando con Supabase...');
  try{
    const rows=await sbFetch('indices','GET',null,'?select=id,datos&limit=1');
    if(rows&&rows.length){
      SB_ROW_ID=rows[0].id;
      const p=JSON.parse(rows[0].datos);delete p.__sbId;IDX_STORE=p;
    } else {IDX_STORE={};SB_ROW_ID=null;}
    SB_OK=true;setSb('ok','⬤ Conectado');
    const total=Object.values(IDX_STORE).reduce((s,v)=>s+(v?.rows?.length||0),0);
    setStatus('ok',`Supabase OK · ${total} filas cargadas`);
  }catch(e){
    SB_OK=false;IDX_STORE={};setSb('err','⬤ Sin conexión');
    setStatus('err','Error Supabase: '+e.message);
  }
  renderAll();renderSel();hideLoader();
}

async function saveToSupabase(){
  showLoader('Guardando en Supabase...');
  try{
    const payload={datos:JSON.stringify(IDX_STORE)};
    if(SB_ROW_ID)await sbFetch('indices','PATCH',payload,`?id=eq.${SB_ROW_ID}`);
    else{const r=await sbFetch('indices','POST',payload);if(r&&r[0])SB_ROW_ID=r[0].id;}
    SB_OK=true;setSb('ok','⬤ Conectado');
    setStatus('ok','✅ Guardado en Supabase');
    toast('Guardado en Supabase','ok');
  }catch(e){setStatus('err','Error: '+e.message);toast('Error al guardar','er');}
  hideLoader();
}

// ═══════════════ GEMINI ═══════════════
async function callGemini(prompt){
  for(let i=0;i<3;i++){
    try{
      const r=await fetch(GEMINI_PROXY,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
        body:JSON.stringify({parts:[{text:prompt}]})
      });
      if(r.status===502||r.status===503){await sleep(2000);continue;}
      if(!r.ok)throw new Error('proxy '+r.status);
      const d=await r.json();
      return (d?.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('\n').trim();
    }catch(e){if(i===2)throw e;await sleep(1200);}
  }
}

function parseJSON(txt){
  if(!txt)return null;
  let raw=txt.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  const m=raw.match(/\{[\s\S]*\}/);if(!m)return null;
  try{
    let c=m[0].replace(/,\s*}/g,'}').replace(/,\s*]/g,']')
      .replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/\n/g,' ');
    return JSON.parse(c);
  }catch{return null;}
}

// ═══════════════ INDEC API ═══════════════
const SERIES_API = 'https://apis.datos.gob.ar/series/api/series';
const SERIES_IDS = {
  ipc_nac:   '148.3_INIVELNAL_DICI_M_26',
  ipc_gba:   '148.3_INIVELGBA_DICI_M_21',
  ipc_pat:   '148.3_INIVELNIA_DICI_M_27',
  ipim_gral: '448.1_NIVEL_GENERAL_0_0_13_46',
  ipim_r29:  '448.1_REFINADOS_PETROLEO_0_0_13_46'
};
const SERIES_FALLBACK = {
  ipc_pat:  ['148.3_INIVELPAT_DICI_M_27'],
  ipim_r29: ['178.1_REFINADOS_PETROLEO_0_0_13','178.1_PRP_0_0_13']
};
window._seriesCache = window._seriesCache || {};

function prevYm(ym){
  const p = ym.split('-').map(Number);
  const d = new Date(p[0], p[1]-2, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

async function fetchBundle(sid, pct, fullData){
  const key = sid + (pct ? '_pct' : '_idx') + (fullData ? '_full' : '');
  if(window._seriesCache[key]) return window._seriesCache[key];
  
  const qid = pct ? sid + ':percent_change' : sid;
  const url = SERIES_API + '?ids=' + encodeURIComponent(qid) + '&format=json&sort=desc'
            + (fullData ? '&limit=600&start_date=2016-01-01' : '&limit=24');
  
  const r = await fetch(url);
  if(!r.ok) throw new Error('series ' + r.status + ' ' + qid);
  const d = await r.json();
  const b = { rows: Array.isArray(d.data)?d.data:[], url: url, pct: pct };
  window._seriesCache[key] = b;
  return b;
}

function findPt(rows, ym){
  return rows.find(x => String(x && x[0] || '').slice(0,7) === ym) || null;
}

function interpret(def, sid, bundle, ym){
  const pt = findPt(bundle.rows, ym);
  if(!pt || pt[1] == null) return null;
  const v = Number(pt[1]);
  if(!isFinite(v)) return null;
  const pub = String(pt[0]).slice(0,10);

  if(bundle.pct){
    // :percent_change — value is monthly % as fraction (0.046) or direct (4.6)
    let pct = Math.abs(v) <= 1.5 ? +(v*100).toFixed(2) : +v.toFixed(2);
    
    // VALIDACIÓN: IPC/IPIM mensual nunca >50%
    if(Math.abs(pct) > 50) return null;
    
    return { ym:ym, pct:pct, value:null, seriesId:sid, calcMethod:'pct',
             publishedAt:pub, sourceUrl:bundle.url, source:def.src, rawValue:v,
             note:'INDEC % mensual (' + sid + ')' };
  }

  // Index mode — compute ratio with previous month
  const prev = findPt(bundle.rows, prevYm(ym));
  if(v > 20 && prev && prev[1] != null){
    const pv = Number(prev[1]);
    if(isFinite(pv) && pv > 0 && v > 0){
      const pct2 = ((v/pv)-1)*100;
      if(isFinite(pct2) && Math.abs(pct2) < 200)
        return { ym:ym, pct:+pct2.toFixed(2), value:null,
                 seriesValue:+v.toFixed(4), seriesPrevValue:+pv.toFixed(4),
                 seriesId:sid, calcMethod:'ratio', publishedAt:pub, sourceUrl:bundle.url,
                 source:def.src, rawValue:v, note:'INDEC índice (' + sid + ')' };
    }
  }
  if(Math.abs(v) <= 1.5) return { ym:ym, pct:+(v*100).toFixed(2), value:null, seriesId:sid, calcMethod:'frac', publishedAt:pub, sourceUrl:bundle.url, source:def.src, rawValue:v, note:'INDEC frac' };
  if(Math.abs(v) <= 200) return { ym:ym, pct:+v.toFixed(2), value:null, seriesId:sid, calcMethod:'direct', publishedAt:pub, sourceUrl:bundle.url, source:def.src, rawValue:v, note:'INDEC directo' };
  return null;
}

async function fetchIndecYm(def, ym){
  const sid = SERIES_IDS[def.id];
  if(!sid) return null;
  
  // 1. Try :percent_change (recent data first)
  try{ 
    const b = await fetchBundle(sid, true, false); 
    const r = interpret(def, sid, b, ym); 
    if(r) return r; 
  }catch(e){ console.warn('pct recent', sid, ym, e); }
  
  // 2. Try :percent_change (full historical)
  try{ 
    const b = await fetchBundle(sid, true, true); 
    const r = interpret(def, sid, b, ym); 
    if(r) return r; 
  }catch(e){ console.warn('pct full', sid, ym, e); }
  
  // 3. Try index-based ratio (recent)
  try{ 
    const b = await fetchBundle(sid, false, false); 
    const r = interpret(def, sid, b, ym); 
    if(r) return r; 
  }catch(e){ console.warn('idx recent', sid, ym, e); }
  
  // 4. Try index-based ratio (full)
  try{ 
    const b = await fetchBundle(sid, false, true); 
    const r = interpret(def, sid, b, ym); 
    if(r) return r; 
  }catch(e){ console.warn('idx full', sid, ym, e); }
  
  // 5. Fallback series
  const fbs = SERIES_FALLBACK[def.id] || [];
  for(let i=0; i<fbs.length; i++){
    // Intenta pct primero
    try{ 
      const fb = await fetchBundle(fbs[i], true, false); 
      const rf = interpret(def, fbs[i], fb, ym); 
      if(rf) return rf; 
    }catch(e){}
    // Luego raw
    try{ 
      const fb2 = await fetchBundle(fbs[i], false, false); 
      const rf2 = interpret(def, fbs[i], fb2, ym); 
      if(rf2) return rf2; 
    }catch(e){}
  }
  
  return null;
}

async function fetchUsdYm(ym){
  try{
    const r=await fetch('https://api.argentinadatos.com/v1/cotizaciones/dolares');
    if(!r.ok)throw new Error('API '+r.status);
    const data=await r.json();
    const[y,m]=ym.split('-').map(Number);
    const end=new Date(y,m,0);
    let arr=data.filter(x=>x&&x.fecha&&new Date(x.fecha)<=end);
    let bna=arr.filter(x=>/nacion|bna/i.test(String(x.casa||'')));
    let src=(bna.length?bna:arr).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
    const last=src[src.length-1];
    if(last&&(last.venta||last.sell)){
      return{ym,value:Number(last.venta||last.sell),pct:null,
        publishedAt:String(last.fecha||'').substring(0,10),
        note:'BNA TC vendedor - argentinadatos.com'};
    }
  }catch(e){console.warn('fetchUsd',ym,e);}
  return null;
}

// ═══════════════ FUEL API ═══════════════
const FUEL_PRODUCT = { go_g2:'Gasoil Grado 2', go_g3:'Gasoil Grado 3' };
const RES_HIST    = 'f8dda0d5-2a9f-4d34-b79b-4e63de3995df';
const RES_VIGENTE = '80ac25de-a44a-4445-9215-090cf55cfda5';
const ENERGIA_API = 'https://datos.energia.gob.ar/api/3/action/datastore_search';

async function fetchFuelACAYm(idxId, ym) {
  const productName = FUEL_PRODUCT[idxId];
  if (!productName) return null;

  const [y, mo] = ym.split('-').map(Number);
  const lastDay = new Date(y, mo, 0);
  const lastDayStr = lastDay.toISOString().substring(0, 10);
  const firstDayStr = ym + '-01';

  function isACA(rec) {
    const rs = String(rec.razon_social || rec.empresa || '').toUpperCase();
    return rs.includes('ACA') || rs.includes('AUTOMOVIL CLUB') || rs.includes('AUTOMOVILCLUB');
  }
  
  function avgPrice(recs) {
    const prices = recs.map(r => parseFloat(r.precio || r.precio_por_litro || 0)).filter(p => p > 0);
    if (!prices.length) return null;
    return Math.round(prices.reduce((a,b)=>a+b,0)/prices.length * 100) / 100;
  }

  // 1. Recurso histórico — AMPLIADO: busca todo Neuquén, luego filtra ACA
  try {
    const filters = encodeURIComponent(JSON.stringify({provincia:'NEUQUEN'}));
    const urlH = ENERGIA_API + '?resource_id=' + RES_HIST + '&filters=' + filters + '&limit=2000';
    const rH = await fetch(urlH);
    if (rH.ok) {
      const dH = await rH.json();
      const recs = (dH?.result?.records || []).filter(rec => {
        const prod = String(rec.producto || '').toUpperCase();
        const fd = String(rec.fecha_desde_vigencia || rec.indice_tiempo || '').substring(0, 10);
        // Match producto (flexible: "GASOIL GRADO 2" o "GAS OIL GRADO 2")
        const prodMatch = prod.includes('GASOIL') || prod.includes('GAS OIL');
        const gradeMatch = productName.includes('Grado 2') ? prod.includes('GRADO 2') || prod.includes('G2') : prod.includes('GRADO 3') || prod.includes('G3');
        return isACA(rec) && prodMatch && gradeMatch && fd >= firstDayStr && fd <= lastDayStr;
      });
      const avg = avgPrice(recs);
      if (avg) {
        const last = recs[recs.length - 1];
        return { ym, value: avg, pct: null,
          publishedAt: String(last.fecha_desde_vigencia || lastDayStr).substring(0, 10),
          note: 'ACA Neuquén · Sec. Energía Nación',
          sourceUrl: 'https://datos.energia.gob.ar/dataset/precios-en-surtidor' };
      }
    }
  } catch(e) { console.warn('fetchFuelHist', idxId, ym, e); }

  // 2. Recurso vigente (solo mes actual)
  const nowYm = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0');
  if (ym === nowYm) {
    try {
      const filters2 = encodeURIComponent(JSON.stringify({provincia:'NEUQUEN'}));
      const urlV = ENERGIA_API + '?resource_id=' + RES_VIGENTE + '&filters=' + filters2 + '&limit=1000';
      const rV = await fetch(urlV);
      if (rV.ok) {
        const dV = await rV.json();
        const recs = (dV?.result?.records || []).filter(rec => {
          const prod = String(rec.producto || '').toUpperCase();
          const prodMatch = prod.includes('GASOIL') || prod.includes('GAS OIL');
          const gradeMatch = productName.includes('Grado 2') ? prod.includes('GRADO 2') || prod.includes('G2') : prod.includes('GRADO 3') || prod.includes('G3');
          return isACA(rec) && prodMatch && gradeMatch;
        });
        const avg = avgPrice(recs);
        if (avg) return { ym, value: avg, pct: null, publishedAt: lastDayStr,
          note: 'ACA Neuquén · vigente Sec. Energía',
          sourceUrl: 'https://datos.energia.gob.ar/dataset/precios-en-surtidor' };
      }
    } catch(e) { console.warn('fetchFuelVig', idxId, ym, e); }
  }

  return null;
}

let _tasks = [];

async function startAISearch(){
  const from=document.getElementById('ctrlFrom').value, to=document.getElementById('ctrlTo').value;
  if(!from||!to||from>to){ toast('Aplicá un rango válido primero','er'); return; }
  
  const defs=IDX_CATALOG.filter(d=>d.cat!=='mo'&&_selectedIdx.has(d.id));
  if(!defs.length){ toast('Seleccioná al menos un índice','er'); return; }
  
  const months=_months.length?_months:buildRange(from,to);
  _tasks=[];
  defs.forEach(def=>{ 
    months.forEach(ym=>{ 
      const ex=idxGet(def.id,ym); 
      if(!ex||(ex.pct==null&&ex.value==null)) 
        _tasks.push({def,ym,status:'pending',found:null,via:null}); 
    }); 
  });
  
  if(!_tasks.length){ toast('No hay períodos faltantes','ok'); return; }
  
  document.getElementById('aiPanel').classList.add('vis');
  document.getElementById('btnStop').style.display='';
  document.getElementById('btnAI').disabled=true;
  document.getElementById('aiSub').textContent='· '+_tasks.length+' búsquedas';
  document.getElementById('aiBar').style.width='0%';
  document.getElementById('aiLog').innerHTML='';
  _aiStop=false;
  
  let done=0,found=0,manual=0,official=0,ai=0;
  
  for(let ti=0;ti<_tasks.length;ti++){
    const t=_tasks[ti];
    if(_aiStop) break;
    
    t.status='running'; 
    renderLog();
    
    try{
      let result=null, via=null;
      
      // USD
      if(t.def.cat==='usd'){ 
        result=await fetchUsdYm(t.ym); 
        via='api'; 
      }
      // FUEL
      else if(t.def.cat==='fuel'){ 
        result=await fetchFuelACAYm(t.def.id,t.ym); 
        if(result) via='api';
        
        // Fallback Gemini si API Energía falla
        if(!result){
          const txt=await callGemini(buildPrompt(t.def,t.ym));
          result=parseJSON(txt);
          via=result?'ai':null;
        }
        
        // Retry agresivo
        if(!result){
          const txt2=await callGemini(buildPromptAggressive(t.def,t.ym));
          result=parseJSON(txt2);
          via=result?'ai':null;
        }
      }
      // INDEC
      else if(t.def.src==='INDEC'){
        try{ 
          result=await fetchIndecYm(t.def,t.ym); 
          if(result) via='api'; 
        }catch(e){ console.warn('fetchIndec',e); }
        
        // Fallback Gemini standard
        if(!result){ 
          const txt=await callGemini(buildPrompt(t.def,t.ym)); 
          result=parseJSON(txt); 
          via=result?'ai':null; 
        }
        
        // Retry agresivo si aún null
        if(!result){
          const txt2=await callGemini(buildPromptAggressive(t.def,t.ym));
          result=parseJSON(txt2);
          via=result?'ai':null;
        }
      } 
      // Otros (FADEAAC, DPEyC NQN)
      else { 
        const txt=await callGemini(buildPrompt(t.def,t.ym)); 
        result=parseJSON(txt); 
        via=result?'ai':null; 
        
        // Retry agresivo
        if(!result){
          const txt2=await callGemini(buildPromptAggressive(t.def,t.ym));
          result=parseJSON(txt2);
          via=result?'ai':null;
        }
      }

      if(result&&(result.pct!=null||result.value!=null)){
        idxSet(t.def.id,{
          ym:result.ym||t.ym,
          pct:result.pct!=null?Number(result.pct):null,
          value:result.value!=null?Number(result.value):null,
          seriesValue:result.seriesValue!=null?Number(result.seriesValue):null,
          seriesPrevValue:result.seriesPrevValue!=null?Number(result.seriesPrevValue):null,
          seriesId:result.seriesId||null,
          calcMethod:result.calcMethod||null,
          confirmed:false,
          status:'updated',
          source:t.def.src,
          note:result.note||'',
          publishedAt:result.publishedAt||null,
          sourceUrl:result.sourceUrl||null
        });
        _meta[t.def.id+'_'+t.ym]=via==='api'?'api':'ai';
        t.status='found'; 
        t.found=result; 
        t.via=via; 
        found++;
        if(via==='api')official++; else ai++;
        liveCellOk(t.def,t.ym,result,via);
      } else { 
        console.warn('⚠️ NO DATA:', t.def.id, '('+t.def.name+')', t.ym, '| via:', via, '| result:', result);
        t.status='manual'; 
        t.via='manual'; 
        _meta[t.def.id+'_'+t.ym]='manual'; 
        manual++; 
        liveCellManual(t.def,t.ym); 
      }
    }catch(e){ 
      console.error('❌ TASK FAILED:', t.def.id, '('+t.def.name+')', t.ym, '| via:', via, '| error:', e); 
      t.status='manual'; 
      t.via='manual'; 
      _meta[t.def.id+'_'+t.ym]='manual'; 
      manual++; 
      liveCellManual(t.def,t.ym); 
    }
    
    done++;
    document.getElementById('aiBar').style.width=Math.round(done/_tasks.length*100)+'%';
    updateAIStats(found,manual,done,_tasks.length,official,ai);
    renderLog();
    await sleep(220);
  }
  
  document.getElementById('btnStop').style.display='none';
  document.getElementById('btnAI').disabled=false;
  document.getElementById('aiSub').textContent='· Listo: '+found+' encontrados, '+manual+' manuales';
  
  if(found>0){ 
    toast('Actualización: '+found+' · '+manual+' manuales','ai'); 
    await saveToSupabase(); 
  } else toast('Sin datos · '+manual+' manuales','er');
  
  renderAll();
}

function stopAI(){
  _aiStop=true;
  document.getElementById('btnStop').style.display='none';
  toast('Detenido','er');
}

// ═══════════════ LOG & STATS ═══════════════
function renderLog(){
  const log=document.getElementById('aiLog');
  const show=_tasks.slice(-50);
  log.innerHTML=show.map(t=>{
    const ico={pending:'⏳',running:'🔄',found:t.via==='api'?'🏛️':'✅',manual:'⚠️',failed:'❌'}[t.status]||'⏳';
    const cls=t.status==='found'&&t.via==='api'?'api':({pending:'pending',running:'running',found:'found',manual:'manual',failed:'failed'}[t.status]||'pending');
    let val='',note='';
    if(t.found){ 
      if(t.found.pct!=null)val=pF(t.found.pct); 
      else if(t.found.value!=null)val='$'+Number(t.found.value).toFixed(2); 
      if(t.found.seriesId)note='<span class="ai-log-note">'+esc(t.found.seriesId)+'</span>'; 
    }
    return `<div class="ai-log-row ${cls}">
      <span class="ai-log-ico">${ico}</span>
      <span class="ai-log-name">${esc(t.def.name)}${note}</span>
      <span class="ai-log-ym">${fmtM(t.ym)}${t.via==='api'?' · oficial':t.via==='ai'?' · IA':''}</span>
      ${val?`<span class="ai-log-val">${esc(val)}</span>`:''}
    </div>`;
  }).join('');
  log.scrollTop=log.scrollHeight;
}

function updateAIStats(found,manual,done,total,official,ai){
  official=official||0; ai=ai||0;
  document.getElementById('aiStats').innerHTML=
    `<span class="ai-stat info">${done}/${total}</span>
     <span class="ai-stat ok">🏛️ ${official}</span>
     <span class="ai-stat info">🤖 ${ai}</span>
     <span class="ai-stat ok">✅ ${found}</span>
     <span class="ai-stat warn">⚠️ ${manual} manuales</span>`;
}

function liveCellOk(def,ym,result,via){
  const metaType=via==='api'?'api':'ai';
  const field=isUsd(def)?'value':'pct';
  const inp=document.getElementById('ci_'+def.id+'_'+ym+'_'+field);
  if(inp){ 
    const val=field==='value'?result.value:result.pct; 
    if(val!=null){ 
      inp.value=Number(val).toFixed(2); 
      inp.className=inp.className.replace(/\b(need-manual|has-val|ai-found|api-found)\b/g,'').trim()+' has-val '+(metaType==='api'?'api-found':'ai-found'); 
    } 
  }
}

function liveCellManual(def,ym){
  const field=isUsd(def)?'value':'pct';
  const inp=document.getElementById('ci_'+def.id+'_'+ym+'_'+field);
  if(inp&&!inp.value){ 
    inp.className=inp.className.replace(/\b(has-val|ai-found|api-found)\b/g,'').trim()+' need-manual'; 
  }
}

// ═══════════════ SELECTOR ═══════════════
function countMissing(id){
  return _months.filter(ym=>{
    const ex=idxGet(id,ym);
    return !ex||(ex.pct==null&&ex.value==null);
  }).length;
}

function renderSel(){
  const wrap=document.getElementById('selectorList');
  const stats=document.getElementById('selStats');
  if(!wrap||!stats) return;

  const allAuto=IDX_CATALOG.filter(d=>d.cat!=='mo');
  const selN=allAuto.filter(d=>_selectedIdx.has(d.id)).length;
  const missN=allAuto.filter(d=>_selectedIdx.has(d.id))
                     .reduce((acc,d)=>acc+countMissing(d.id),0);

  stats.textContent=selN+'/'+allAuto.length+' seleccionados · '+missN+' celdas faltantes';

  wrap.innerHTML=allAuto.map(def=>{
    const active=_selectedIdx.has(def.id);
    const missing=countMissing(def.id);
    return `<label class="sel-chip${active?' active':''}">
      <input type="checkbox" data-idx="${def.id}" ${active?'checked':''}>
      <span>${esc(def.name)}</span>
      <small>${missing}</small>
    </label>`;
  }).join('');

  wrap.querySelectorAll('input[data-idx]').forEach(chk=>{
    chk.addEventListener('change',function(){
      const id=this.getAttribute('data-idx');
      if(this.checked) _selectedIdx.add(id);
      else _selectedIdx.delete(id);
      renderSel();
    });
  });
}

function selectAllAuto(){ 
  _selectedIdx=new Set(IDX_CATALOG.filter(d=>d.cat!=='mo').map(d=>d.id)); 
  renderSel(); 
}
function clearSelectedAuto(){ 
  _selectedIdx=new Set(); 
  renderSel(); 
}

// ═══════════════ UI ═══════════════
function showLoader(msg){document.getElementById('loaderMsg').textContent=msg;document.getElementById('loaderOv').classList.add('show');}
function hideLoader(){document.getElementById('loaderOv').classList.remove('show');}
let _tt=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3500);
}
function setSb(type,txt){const el=document.getElementById('sbBadge');el.textContent=txt;el.className='sb-badge '+type;}
function setStatus(type,msg){
  const b=document.getElementById('statusBar');b.className='status-bar '+type;
  document.getElementById('statusMsg').textContent=msg;
}

function initRange(){
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth()-6,1);
  document.getElementById('ctrlFrom').value=from.getFullYear()+'-'+String(from.getMonth()+1).padStart(2,'0');
  document.getElementById('ctrlTo').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
}

function applyRange(){
  const from=document.getElementById('ctrlFrom').value;
  const to=document.getElementById('ctrlTo').value;
  if(!from||!to){toast('Ingresá un rango','er');return;}
  if(from>to){toast('Rango inválido','er');return;}
  _months=buildRange(from,to);
  renderAll();
  toast('Rango aplicado: '+_months.length+' meses','ok');
}

function renderAll(){
  const main=document.getElementById('mainContent');
  if(!_months.length){
    main.innerHTML='<div style="text-align:center;padding:40px;color:var(--g500)">Aplicá un rango de fechas primero</div>';
    return;
  }

  const cats=CAT_ORDER.map(cat=>{
    const defs=IDX_CATALOG.filter(d=>d.cat===cat);
    if(!defs.length)return'';

    const rows=defs.map(def=>{
      const cells=_months.map(ym=>{
        const ex=idxGet(def.id,ym);
        const field=isUsd(def)?'value':'pct';
        const val=ex?ex[field]:'';
        const metaKey=def.id+'_'+ym;
        const metaType=_meta[metaKey]||'';
        let cls='cell-inp '+(isUsd(def)?'usd-w':'');
        if(val) cls+=' has-val';
        if(metaType==='api') cls+=' api-found';
        else if(metaType==='ai') cls+=' ai-found';
        else if(metaType==='manual'&&!val) cls+=' need-manual';
        return `<td><input type="text" class="${cls}" id="ci_${def.id}_${ym}_${field}" value="${val||''}" data-idx="${def.id}" data-ym="${ym}" data-field="${field}"></td>`;
      }).join('');
      return `<tr>
        <td class="td-idx">${esc(def.name)}<div class="td-src">${esc(def.src)}</div></td>
        ${cells}
      </tr>`;
    }).join('');

    const ths=_months.map(ym=>`<th>${fmtM(ym)}</th>`).join('');

    return `<div class="cat-sec">
      <div class="cat-hdr">
        <h2>${CAT_LABEL[cat]}</h2>
        <span class="cat-pill ${cat}">${defs.length}</span>
      </div>
      <div class="grid-wrap">
        <table class="grid-tbl">
          <thead><tr><th class="th-idx">Índice</th>${ths}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  main.innerHTML=cats;

  // Attach input listeners
  main.querySelectorAll('.cell-inp').forEach(inp=>{
    inp.addEventListener('blur',function(){
      const id=this.dataset.idx;
      const ym=this.dataset.ym;
      const field=this.dataset.field;
      const val=this.value.trim();
      if(val){
        const row={ym,confirmed:false,status:'updated'};
        row[field]=Number(val);
        idxSet(id,row);
        this.classList.add('has-val');
        this.classList.remove('need-manual');
      }
    });
  });
}

function exportJSON(){
  const b=new Blob([JSON.stringify(IDX_STORE,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='idx_store_'+new Date().toISOString().substring(0,10)+'.json';a.click();
  toast('JSON exportado','ok');
}

// ═══════════════ BOOT ═══════════════
document.addEventListener('DOMContentLoaded',async()=>{
  if(location.protocol==='file:'){
    setStatus('err','⚠️ Abrí desde servidor local: python -m http.server 8080');
    setSb('err','⬤ file:// bloqueado');
    return;
  }
  initRange();
  await loadFromSupabase();
});
</script>
