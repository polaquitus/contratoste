<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Buscar Series INDEC</title></head>
<body style="font-family:monospace;padding:20px;max-width:1200px;margin:0 auto">
<h2>🔍 Búsqueda Series INDEC</h2>
<button onclick="buscarTodas()">Buscar Todas</button>
<pre id="output" style="background:#f5f5f5;padding:15px;border-radius:4px;font-size:11px"></pre>

<script>
const BUSQUEDAS = [
  {name: 'IPC GBA', query: 'IPC GBA nivel general mensual'},
  {name: 'IPC Patagonia', query: 'IPC Patagonia nivel general mensual'},
  {name: 'IPIM General', query: 'IPIM nivel general mensual'},
  {name: 'IPC Nacional (verificar)', query: 'IPC Nacional nivel general mensual'}
];

async function buscarSerie(busqueda) {
  const url = `https://apis.datos.gob.ar/series/api/search?q=${encodeURIComponent(busqueda.query)}&catalog_id=sspm&limit=20`;
  
  try {
    const r = await fetch(url);
    const d = await r.json();
    
    const out = document.getElementById('output');
    out.textContent += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    out.textContent += `${busqueda.name}\n`;
    out.textContent += `Query: "${busqueda.query}"\n`;
    out.textContent += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    
    if (!d.data || d.data.length === 0) {
      out.textContent += `❌ Sin resultados\n`;
      return;
    }
    
    out.textContent += `✅ ${d.data.length} resultados:\n\n`;
    
    d.data.slice(0, 5).forEach((item, i) => {
      const seriesId = item.id || item.serie_id || item.identifier || '???';
      const title = item.title || item.description || '(sin título)';
      const desc = item.description || '';
      
      out.textContent += `[${i + 1}] ${seriesId}\n`;
      out.textContent += `    ${title}\n`;
      if (desc && desc !== title) {
        out.textContent += `    ${desc.substring(0, 100)}...\n`;
      }
      out.textContent += `\n`;
    });
    
  } catch (err) {
    const out = document.getElementById('output');
    out.textContent += `\n❌ Error en ${busqueda.name}: ${err.message}\n`;
  }
}

async function buscarTodas() {
  document.getElementById('output').textContent = 'Buscando series...\n';
  
  for (const b of BUSQUEDAS) {
    await buscarSerie(b);
    await new Promise(r => setTimeout(r, 800));
  }
  
  document.getElementById('output').textContent += `\n✅ BÚSQUEDA COMPLETA\n`;
}
</script>
</body>
</html>
