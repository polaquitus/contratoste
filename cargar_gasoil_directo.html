<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carga Gas Oil Directa</title>
<style>
body{font-family:system-ui;padding:30px;max-width:800px;margin:0 auto;background:#f5f5f5}
.card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px}
button{background:#0066cc;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px}
button:disabled{opacity:.4;cursor:not-allowed}
.log{background:#111;color:#0f0;border-radius:6px;padding:14px;font-family:monospace;font-size:12px;max-height:450px;overflow-y:auto;white-space:pre-wrap}
.stat{display:inline-block;background:#e8f4fd;border-radius:6px;padding:8px 16px;margin:4px;font-weight:700;color:#0066cc}
</style>
</head>
<body>
<div class="card">
  <h2 style="margin:0 0 12px">⛽ Carga Gas Oil → Supabase</h2>
  <div id="stats"></div>
  <br>
  <button id="btnRun" onclick="run()">▶ Ejecutar</button>
  <button id="btnSave" onclick="save()" disabled>💾 Guardar en Supabase</button>
</div>
<div class="card">
  <div class="log" id="log">Listo para iniciar...</div>
</div>

<script>
const SB   = 'https://upxsqroxbvzwudcaklvn.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVweHNxcm94YnZ6d3VkY2FrbHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg4NjYsImV4cCI6MjA5MTIzNDg2Nn0.EgXWuLg3ip66PnuCvK01XFj3QDMZDu7PDG21BwkzkNo';
const PROXY = SB + '/functions/v1/energia-proxy';
const GEM   = SB + '/functions/v1/gemini-proxy';
const AUTH  = { 'Content-Type':'application/json', 'Authorization':'Bearer '+KEY };
const START = '2023-12';

let STORE = {}, recId, g2 = {}, g3 = {};

const L = (m,c='') => { const el=document.getElementById('log'); el.textContent+=m+'\n'; el.scrollTop=el.scrollHeight; if(c)console[c](m); };
const stats = () => { document.getElementById('stats').innerHTML = `<span class="stat">G2: ${Object.keys(g2).length} períodos</span><span class="stat">G3: ${Object.keys(g3).length} períodos</span>`; };

async function proxyGet(url) {
  const r = await fetch(PROXY, { method:'POST', headers:AUTH, body:JSON.stringify({url}) });
  if (!r.ok) throw new Error('proxy '+r.status);
  return r.json();
}

function filtrar(records) {
  return records.filter(r => {
    const prov = (r.provincia||r.idprovincia||'').toString().toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    const emp  = (r.empresa||r.razon_social||r.empresabandera||r.idempresa||'').toString().toUpperCase();
    const prod = (r.producto||r.idproducto||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    return (prov.includes('NEUQU')||prov==='58'||prov==='30') &&
           (emp.includes('YPF')||emp.includes('ACA')||emp.includes('AUTOMOVIL')) &&
           (prod.includes('gasoil')||prod.includes('diesel')||prod.includes('gas oil'));
  });
}

function procesar(records) {
  let n = 0;
  for (const r of records) {
    const prod = (r.producto||r.idproducto||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    const fecha = (r.fecha_vigencia||r.fechavigencia||r.fecha||r.vigdesde||'').toString();
    const precio = parseFloat((r.precio||r.importe||'0').toString().replace(',','.'));
    if (!fecha||!precio||precio<=0) continue;
    const ym = fecha.slice(0,7);
    if (!ym||ym<START) continue;
    const isG2 = prod.includes('grado 2')||prod.includes('grado_2')||prod.includes('comun')||prod.includes('500')||prod.includes('g2');
    const isG3 = prod.includes('grado 3')||prod.includes('grado_3')||prod.includes('premium')||prod.includes('ultra')||prod.includes('infinia')||prod.includes('euro')||prod.includes('g3');
    if (isG2 && (!g2[ym]||precio>g2[ym])) { g2[ym]=precio; n++; }
    else if (isG3 && (!g3[ym]||precio>g3[ym])) { g3[ym]=precio; n++; }
  }
  return n;
}

async function ckan(url, nombre) {
  L(`\n→ CKAN ${nombre}...`);
  try {
    let j = await proxyGet(url);
    if (!j.success) { L(`  ✗ ${j.error?.message||JSON.stringify(j.error)}`); return; }
    let records = j.result?.records || [];
    const total = j.result?.total || 0;
    L(`  total dataset: ${total} | descargados: ${records.length}`);
    if (records.length && Object.keys(records[0]).length) L(`  columnas: ${Object.keys(records[0]).join(', ')}`);

    let offset = records.length;
    while (offset < total) {
      const pj = await proxyGet(url + '&offset=' + offset);
      const page = pj.result?.records || [];
      if (!page.length) break;
      records = records.concat(page);
      offset += page.length;
      L(`  paginando... ${records.length}/${total}`);
      await new Promise(r=>setTimeout(r,300));
    }

    const filtrados = filtrar(records);
    L(`  filtrados YPF/ACA NQN gasoil: ${filtrados.length}`);
    if (filtrados.length===0 && records.length>0) {
      const provs = [...new Set(records.slice(0,200).map(r=>r.provincia||r.idprovincia||''))].slice(0,8);
      const prods = [...new Set(records.slice(0,200).map(r=>r.producto||r.idproducto||''))].slice(0,8);
      L(`  provincias muestra: ${provs.join(', ')}`);
      L(`  productos muestra: ${prods.join(', ')}`);
    }
    const proc = procesar(filtrados);
    L(`  procesados: ${proc} → G2=${Object.keys(g2).length}, G3=${Object.keys(g3).length}`);
    stats();
  } catch(e) { L(`  ✗ ${e.message}`); }
}

async function gemini() {
  L('\n→ Gemini AI (gaps)...');
  const inicio = new Date(START+'-01'), hoy = new Date(), meses = [];
  let cur = new Date(inicio);
  while (cur <= hoy) {
    meses.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0'));
    cur.setMonth(cur.getMonth()+1);
  }
  L(`  meses a cubrir: ${meses.length}`);
  for (const ym of meses) {
    if (g2[ym] && g3[ym]) continue;
    const [y,m] = ym.split('-');
    const mn = new Date(+y,+m-1,1).toLocaleDateString('es-AR',{month:'long'});
    const prompt = `Eres experto en combustibles Argentina. Precio Gas Oil YPF Neuquén Capital para ${mn} ${y} (${ym}).
Referencia: Nov23 G2~405 G3~510, Dic23 G2~524 G3~660, Ene24 G2~700 G3~870, Feb24 G2~800 G3~980, Mar24 G2~910 G3~1100, Jun24 G2~909 G3~1080. 2024 subía 10-15%/mes, 2025 3-5%/mes.
Responde SOLO JSON: {"ym":"${ym}","g2_precio":<n>,"g3_precio":<n>,"fuente":"<f>"}`;
    try {
      const r = await fetch(GEM,{method:'POST',headers:AUTH,body:JSON.stringify({parts:[{text:prompt}]})});
      if (!r.ok) throw new Error(r.status);
      const d = await r.json();
      const txt = (d?.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('').trim();
      const raw = txt.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
      const m2 = raw.match(/\{[\s\S]*\}/);
      if (m2) {
        const data = JSON.parse(m2[0].replace(/,\s*}/g,'}').replace(/,\s*]/g,']'));
        if (data.g2_precio && !g2[ym]) { g2[ym]=Number(data.g2_precio); }
        if (data.g3_precio && !g3[ym]) { g3[ym]=Number(data.g3_precio); }
        L(`  ${ym}: G2=$${data.g2_precio||'?'} G3=$${data.g3_precio||'?'} (${data.fuente||'AI'})`);
      }
      stats();
    } catch(e) { L(`  ✗ ${ym}: ${e.message}`); }
    await new Promise(r=>setTimeout(r,700));
  }
}

function buildRows(datos) {
  return Object.keys(datos).sort().map((ym,i,arr) => {
    const valor = datos[ym];
    const prev = i>0 ? datos[arr[i-1]] : null;
    return { ym, value: Number(valor.toFixed(2)), pct: prev ? Number((((valor/prev)-1)*100).toFixed(2)) : null, publishedAt: null, source: 'API/AI', confirmed: false };
  });
}

async function run() {
  document.getElementById('btnRun').disabled = true;
  document.getElementById('log').textContent = '';
  g2 = {}; g3 = {};

  L('Cargando estado Supabase...');
  const rr = await fetch(`${SB}/rest/v1/indices?select=id,datos&limit=1`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  const rows = await rr.json();
  recId = rows[0].id;
  STORE = JSON.parse(rows[0].datos);
  L(`Registro ${recId} | G2 previo: ${STORE.go_g2?.rows?.length||0} | G3 previo: ${STORE.go_g3?.rows?.length||0}`);

  const H = 'https://datos.energia.gob.ar/api/3/action/datastore_search?resource_id=f8dda0d5-2a9f-4d34-b79b-4e63de3995df&limit=32000';
  const V = 'https://datos.energia.gob.ar/api/3/action/datastore_search?resource_id=80ac25de-a44a-4445-9215-090cf55cfda5&limit=32000';
  await ckan(H, 'Histórico');
  await ckan(V, 'Vigentes');
  await gemini();

  const rowsG2 = buildRows(g2), rowsG3 = buildRows(g3);
  L(`\n✓ G2: ${rowsG2.length} períodos (${rowsG2[0]?.ym}→${rowsG2[rowsG2.length-1]?.ym})`);
  L(`✓ G3: ${rowsG3.length} períodos (${rowsG3[0]?.ym}→${rowsG3[rowsG3.length-1]?.ym})`);
  STORE.go_g2 = {rows: rowsG2};
  STORE.go_g3 = {rows: rowsG3};
  stats();
  if (rowsG2.length>0||rowsG3.length>0) document.getElementById('btnSave').disabled = false;
  else L('⚠ Sin datos para guardar');
}

async function save() {
  document.getElementById('btnSave').disabled = true;
  L('\nGuardando en Supabase...');
  const h = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
  const r = await fetch(`${SB}/rest/v1/indices?id=eq.${recId}`,{method:'PATCH',headers:h,body:JSON.stringify({datos:JSON.stringify(STORE)})});
  if (r.ok) { L('✅ Guardado. Recargá index.html para ver los cambios.'); }
  else { L('✗ Error '+r.status); document.getElementById('btnSave').disabled=false; }
}
</script>
</body>
</html>
